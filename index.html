<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alex Runner</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #f7f7f7;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: 'Courier New', monospace;
    overflow: hidden;
  }
  #game-wrapper {
    position: relative;
    width: 800px;
    max-width: 100vw;
  }
  canvas {
    display: block;
    background: #f7f7f7;
    width: 100%;
    height: auto;
  }
  #score {
    position: absolute;
    top: 10px;
    right: 16px;
    font-size: 18px;
    color: #535353;
    letter-spacing: 2px;
    font-weight: bold;
  }
  #message {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    color: #535353;
    pointer-events: none;
  }
  #message h2 { font-size: 24px; margin-bottom: 8px; }
  #message p { font-size: 14px; }

  /* Birthday gate */
  #birth-screen {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: #f7f7f7;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 10;
    color: #535353;
  }
  #birth-screen h2 { font-size: 22px; margin-bottom: 16px; }
  #birth-screen input {
    font-family: 'Courier New', monospace;
    font-size: 20px;
    text-align: center;
    padding: 8px 16px;
    border: 2px solid #535353;
    background: #fff;
    color: #535353;
    letter-spacing: 2px;
    width: 180px;
    outline: none;
  }
  #birth-screen input::placeholder { color: #b0b0b0; }
  #birth-error {
    margin-top: 10px;
    font-size: 13px;
    color: #c0392b;
    height: 18px;
  }
</style>
</head>
<body>
<div id="game-wrapper">
  <div id="birth-screen">
    <h2>ALEX RUNNER</h2>
    <p style="margin-bottom:12px;font-size:14px">Entre ta date de naissance pour jouer</p>
    <input type="text" id="birth-input" placeholder="JJ/MM/AAAA" maxlength="10" autocomplete="off">
    <div id="birth-error"></div>
  </div>
  <canvas id="game" width="800" height="250"></canvas>
  <div id="score">00000</div>
  <div id="message">
    <h2>ALEX RUNNER</h2>
    <p>Appuie sur Espace ou touche l'ecran pour jouer</p>
  </div>
</div>

<script>
// === CONFIGURATION ===
const COLLISION_ENABLED = true;   // false = le joueur ne meurt pas en touchant les obstacles
const DATE_REQUIRED = true;       // false = pas besoin d'entrer la date pour jouer

// Birthday gate
const birthScreen = document.getElementById('birth-screen');
const birthInput = document.getElementById('birth-input');
const birthError = document.getElementById('birth-error');
const VALID_DATE = '04/04/1996';
const BIRTH_DATE_ERROR_MSG = "Ce n'est pas la bonne date, c'est un clin d'oeil 😉";

// Auto-format input as JJ/MM/AAAA
birthInput.addEventListener('input', e => {
  let v = birthInput.value.replace(/[^0-9]/g, '');
  if (v.length > 8) v = v.slice(0, 8);
  if (v.length >= 5) v = v.slice(0, 2) + '/' + v.slice(2, 4) + '/' + v.slice(4);
  else if (v.length >= 3) v = v.slice(0, 2) + '/' + v.slice(2);
  birthInput.value = v;
  birthError.textContent = '';

  if (v.length === 10) {
    if (v === VALID_DATE) {
      birthScreen.style.display = 'none';
    } else {
      birthError.textContent = BIRTH_DATE_ERROR_MSG;
      birthInput.value = '';
    }
  }
});

birthInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && birthInput.value.length === 10) {
    if (birthInput.value === VALID_DATE) {
      birthScreen.style.display = 'none';
    } else {
      birthError.textContent = BIRTH_DATE_ERROR_MSG;
      birthInput.value = '';
    }
  }
});

if (!DATE_REQUIRED) {
  birthScreen.style.display = 'none';
} else {
  birthInput.focus();
}

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const messageEl = document.getElementById('message');

const W = 800, H = 250;
const GROUND_Y = 220;
const GRAVITY = 0.6;
const JUMP_FORCE = -12;
const DUCK_JUMP_FORCE = -10;

let gameState = 'idle'; // idle | running | over
let score = 0;
let highScore = 0;
let speed = 6;
let frame = 0;
let groundOffset = 0;

// Alex head image
const alexHead = new Image();
alexHead.src = 'alex.jpeg';

// Runner (Alex)
const dino = {
  x: 60, y: GROUND_Y, w: 28, h: 60,
  vy: 0, jumping: false, ducking: false,
  legFrame: 0,
  // Smooth animation state
  runCycle: 0,        // continuous running cycle (radians)
  squash: 1,          // vertical scale (1 = normal, <1 = squashed, >1 = stretched)
  squashVel: 0,       // spring velocity for squash recovery
  lean: 0,            // body lean angle (radians)
  landTimer: 0,       // frames since landing (for impact effect)
  wasJumping: false,   // track jump->land transition
  jumpHoldFrames: 0,  // how long jump is held for variable height
  armSwing: 0         // smooth arm angle
};

// Obstacles
let obstacles = [];
let nextObstacleIn = 0;

// Clouds
let clouds = [];
for (let i = 0; i < 4; i++) {
  clouds.push({ x: Math.random() * W, y: 20 + Math.random() * 50 });
}

function reset() {
  dino.y = GROUND_Y;
  dino.vy = 0;
  dino.jumping = false;
  dino.ducking = false;
  dino.runCycle = 0;
  dino.squash = 1;
  dino.squashVel = 0;
  dino.lean = 0;
  dino.landTimer = 0;
  dino.wasJumping = false;
  dino.jumpHoldFrames = 0;
  dino.armSwing = 0;
  obstacles = [];
  nextObstacleIn = 60;
  score = 0;
  speed = 6;
  frame = 0;
}

// Drawing helpers

// Helper: draw a limb pivoting from its TOP (shoulder/hip), hanging down
function drawLimb(pivotX, pivotY, w, h, angle) {
  ctx.save();
  ctx.translate(pivotX, pivotY);
  ctx.rotate(angle);
  ctx.beginPath();
  const r = Math.min(w, h) * 0.35;
  ctx.roundRect(-w / 2, 0, w, h, r);
  ctx.fill();
  ctx.restore();
}

function drawDino() {
  ctx.fillStyle = '#535353';
  const HEAD_SIZE = 24;

  // Update running cycle (speed-dependent for realistic cadence)
  if (!dino.jumping && !dino.ducking && gameState === 'running') {
    dino.runCycle += speed * 0.025;
    dino.landTimer++;
  }

  // Squash & stretch spring physics
  const squashTarget = 1;
  const squashSpring = 0.3;
  const squashDamp = 0.65;
  dino.squashVel += (squashTarget - dino.squash) * squashSpring;
  dino.squashVel *= squashDamp;
  dino.squash += dino.squashVel;

  // Smooth lean: lean forward while running, back while ascending, forward while falling
  let targetLean = 0;
  if (dino.jumping) {
    targetLean = dino.vy < 0 ? -0.08 : 0.1;
  } else if (gameState === 'running' && !dino.ducking) {
    targetLean = 0.05 + Math.sin(dino.runCycle) * 0.02;
  }
  dino.lean += (targetLean - dino.lean) * 0.15;

  // Running body bob
  const bob = (!dino.jumping && !dino.ducking && gameState === 'running')
    ? Math.abs(Math.sin(dino.runCycle)) * 1.2 : 0;

  // Sine-based cycle values for smooth limb motion
  const legSin = Math.sin(dino.runCycle);
  const legCos = Math.cos(dino.runCycle);
  const armSin = Math.sin(dino.runCycle + Math.PI); // arms opposite to legs

  if (dino.ducking && !dino.jumping) {
    // === SLIDE POSE: feet first, leaning back, one arm up ===
    const dw = 48, dh = 24;
    const dy = GROUND_Y - dh;
    dino.w = dw; dino.h = dh;
    dino.drawY = dy;

    const cx = dino.x + 20;
    const cy = GROUND_Y;

    ctx.fillStyle = '#535353';

    // Torso (tilted back ~30deg)
    ctx.save();
    ctx.translate(cx, cy - 12);
    ctx.rotate(-0.4);
    ctx.beginPath();
    ctx.roundRect(-8, -12, 16, 22, 3);
    ctx.fill();
    ctx.restore();

    // Legs extended forward (feet first)
    const hipX = cx + 5;
    const hipY = cy - 6;
    drawLimb(hipX, hipY, 7, 16, -1.2); // upper leg forward
    drawLimb(hipX + 2, hipY, 7, 16, -1.35); // second leg slightly different

    // Left arm raised to the sky (behind the body)
    const shoulderLX = cx - 8;
    const shoulderLY = cy - 20;
    drawLimb(shoulderLX, shoulderLY, 5, 13, 2.6);

    // Right arm trailing back low
    const shoulderRX = cx - 4;
    const shoulderRY = cy - 14;
    drawLimb(shoulderRX, shoulderRY, 5, 10, 0.8);

    // Head (photo) - tilted back
    const headX = cx - 10;
    const headY = cy - 28;
    ctx.save();
    ctx.translate(headX, headY);
    ctx.rotate(-0.3);
    ctx.beginPath();
    ctx.arc(0, 0, HEAD_SIZE / 2, 0, Math.PI * 2);
    ctx.clip();
    ctx.drawImage(alexHead, -HEAD_SIZE / 2, -HEAD_SIZE / 2, HEAD_SIZE, HEAD_SIZE);
    ctx.restore();
    ctx.strokeStyle = '#535353';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(headX, headY, HEAD_SIZE / 2, 0, Math.PI * 2);
    ctx.stroke();

  } else {
    // === STANDING / RUNNING / JUMPING POSE ===
    dino.w = 28; dino.h = 60;
    const baseY = dino.y - bob;
    const dy = baseY - dino.h * dino.squash;
    dino.drawY = dy;

    // Apply squash & stretch: scale around feet
    ctx.save();
    const pivotX = dino.x + 14;
    const pivotY = dino.y; // feet stay on ground
    ctx.translate(pivotX, pivotY);
    ctx.rotate(dino.lean);
    // Squash: wider when squashed, narrower when stretched
    const sx = 1 + (1 - dino.squash) * 0.5;
    ctx.scale(sx, dino.squash);
    ctx.translate(-pivotX, -pivotY);

    const bodyTop = dino.y - dino.h;

    // Head (photo - circular) with slight bob
    const headCx = dino.x + 14;
    const headCy = bodyTop + HEAD_SIZE / 2;
    const headTilt = dino.jumping ? dino.vy * 0.01 : Math.sin(dino.runCycle * 2) * 0.04;
    ctx.save();
    ctx.translate(headCx, headCy);
    ctx.rotate(headTilt);
    ctx.beginPath();
    ctx.arc(0, 0, HEAD_SIZE / 2, 0, Math.PI * 2);
    ctx.clip();
    ctx.drawImage(alexHead, -HEAD_SIZE / 2, -HEAD_SIZE / 2, HEAD_SIZE, HEAD_SIZE);
    ctx.restore();
    ctx.strokeStyle = '#535353';
    ctx.lineWidth = 1.5;
    ctx.save();
    ctx.translate(headCx, headCy);
    ctx.rotate(headTilt);
    ctx.beginPath();
    ctx.arc(0, 0, HEAD_SIZE / 2, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();

    // Torso
    ctx.fillStyle = '#535353';
    ctx.beginPath();
    ctx.roundRect(dino.x + 5, bodyTop + HEAD_SIZE - 1, 18, 23, 3);
    ctx.fill();

    // === LEGS (smooth sine stride, pendulum from hip) ===
    const hipY = bodyTop + HEAD_SIZE + 22;
    const hipLX = dino.x + 8;
    const hipRX = dino.x + 18;
    const LEG_LEN = 16;

    if (dino.jumping) {
      // Legs slightly bent backwards
      drawLimb(hipLX, hipY, 6, LEG_LEN, 0.35);
      drawLimb(hipRX, hipY, 6, LEG_LEN, 0.25);
    } else {
      // Leg angles: inverted so positive angle = leg forward visually
      const legAngleL = -legSin * 0.4;
      const legAngleR = legSin * 0.4;

      drawLimb(hipLX, hipY, 7, LEG_LEN, legAngleL);
      drawLimb(hipRX, hipY, 7, LEG_LEN, legAngleR);

    }

    // === ARMS (pendulum from shoulder, opposite to legs) ===
    const shoulderY = bodyTop + HEAD_SIZE + 3;
    const shoulderLX = dino.x + 4;
    const shoulderRX = dino.x + 24;

    if (dino.jumping) {
      // Arms raised up in Y shape (inverted axis)
      drawLimb(shoulderLX, shoulderY, 5, 13, 2.5);
      drawLimb(shoulderRX, shoulderY, 5, 13, -2.5);
    } else {
      // Cross-body sync: left arm opposite to left leg
      const armAngleL = legSin * 0.35;
      const armAngleR = -legSin * 0.35;
      drawLimb(shoulderLX, shoulderY, 5, 13, armAngleL);
      drawLimb(shoulderRX, shoulderY, 5, 13, armAngleR);
    }

    ctx.restore(); // end squash/stretch transform
  }
}

function drawCactus(ob) {
  ctx.fillStyle = '#535353';
  if (ob.type === 'small') {
    ctx.fillRect(ob.x + 4, GROUND_Y - 34, 10, 34);
    ctx.fillRect(ob.x, GROUND_Y - 22, 6, 14);
    ctx.fillRect(ob.x + 12, GROUND_Y - 28, 6, 10);
  } else if (ob.type === 'large') {
    ctx.fillRect(ob.x + 2, GROUND_Y - 46, 14, 46);
    ctx.fillRect(ob.x - 6, GROUND_Y - 30, 10, 16);
    ctx.fillRect(ob.x + 14, GROUND_Y - 38, 10, 12);
  } else if (ob.type === 'double') {
    ctx.fillRect(ob.x, GROUND_Y - 34, 10, 34);
    ctx.fillRect(ob.x + 18, GROUND_Y - 42, 10, 42);
    ctx.fillRect(ob.x + 8, GROUND_Y - 24, 12, 6);
  }
}

function drawBird(ob) {
  ctx.fillStyle = '#535353';
  const by = ob.y;
  // Body
  ctx.fillRect(ob.x, by, 30, 8);
  // Wings animated
  const wingFrame = Math.floor(frame / 8) % 2;
  if (wingFrame === 0) {
    ctx.fillRect(ob.x + 4, by - 10, 20, 10);
  } else {
    ctx.fillRect(ob.x + 4, by + 8, 20, 10);
  }
  // Beak
  ctx.fillRect(ob.x + 30, by + 2, 8, 4);
}

function drawGround() {
  ctx.fillStyle = '#535353';
  ctx.fillRect(0, GROUND_Y, W, 1);
  // Ground texture
  for (let i = 0; i < W + 20; i += 3) {
    const xp = (i - groundOffset % 20);
    if (Math.sin(xp * 0.5) > 0.7) {
      ctx.fillRect(xp, GROUND_Y + 4 + (xp % 5), 2, 1);
    }
  }
}

function drawClouds() {
  ctx.fillStyle = '#d4d4d4';
  clouds.forEach(c => {
    ctx.fillRect(c.x, c.y, 40, 10);
    ctx.fillRect(c.x + 8, c.y - 6, 24, 8);
    ctx.fillRect(c.x + 4, c.y + 8, 30, 6);
  });
}

function spawnObstacle() {
  const r = Math.random();
  let ob;
  if (r < 0.3) {
    ob = { x: W, type: 'small', w: 18, h: 34, bird: false };
  } else if (r < 0.55) {
    ob = { x: W, type: 'large', w: 28, h: 46, bird: false };
  } else if (r < 0.8) {
    ob = { x: W, type: 'double', w: 28, h: 42, bird: false };
  } else {
    // Bird at random height
    const birdY = Math.random() < 0.5 ? GROUND_Y - 60 : GROUND_Y - 30;
    ob = { x: W, y: birdY, type: 'bird', w: 38, h: 18, bird: true };
  }
  obstacles.push(ob);
  nextObstacleIn = 40 + Math.random() * 60;
}

function checkCollision(ob) {
  // Dino hitbox
  let dx, dy, dw, dh;
  if (dino.ducking && !dino.jumping) {
    dw = 40; dh = 20;
    dx = dino.x + 2;
    dy = GROUND_Y - dh + 2;
    dw -= 4; dh -= 4;
  } else {
    dx = dino.x + 6;
    dy = dino.y - dino.h + 6;
    dw = dino.w - 12;
    dh = dino.h - 6;
  }

  // Obstacle hitbox
  let ox, oy, ow, oh;
  if (ob.bird) {
    ox = ob.x + 2; oy = ob.y + 2; ow = ob.w - 4; oh = ob.h - 4;
  } else {
    ox = ob.x + 2;
    oy = GROUND_Y - ob.h + 2;
    ow = ob.w - 4;
    oh = ob.h - 4;
  }

  return dx < ox + ow && dx + dw > ox && dy < oy + oh && dy + dh > oy;
}

function update() {
  if (gameState !== 'running') return;

  frame++;
  groundOffset += speed;

  // Speed up over time
  speed = 6 + score * 0.002;
  if (speed > 14) speed = 14;

  // Dino physics
  if (dino.jumping) {
    dino.vy += GRAVITY;
    dino.y += dino.vy;
    dino.wasJumping = true;
    if (dino.y >= GROUND_Y) {
      dino.y = GROUND_Y;
      // Landing impact: squash proportional to fall speed
      const impactForce = Math.min(dino.vy * 0.04, 0.25);
      dino.squash = 1 - impactForce;
      dino.squashVel = -impactForce * 0.5;
      dino.vy = 0;
      dino.jumping = false;
      dino.landTimer = 0;
    }
  }

  // Clouds
  clouds.forEach(c => {
    c.x -= speed * 0.2;
    if (c.x < -50) { c.x = W + Math.random() * 100; c.y = 20 + Math.random() * 50; }
  });

  // Obstacles
  nextObstacleIn -= 1;
  if (nextObstacleIn <= 0) spawnObstacle();

  obstacles.forEach(ob => { ob.x -= speed; });
  obstacles = obstacles.filter(ob => ob.x > -50);

  // Collision
  for (const ob of obstacles) {
    if (COLLISION_ENABLED && checkCollision(ob)) {
      gameState = 'over';
      if (score > highScore) highScore = score;
      messageEl.innerHTML = '<h2>GAME OVER</h2><p>Score: ' + String(Math.floor(score)).padStart(5, '0') +
        (highScore > 0 ? ' | Record: ' + String(Math.floor(highScore)).padStart(5, '0') : '') +
        '</p><p style="margin-top:8px">Appuie sur Espace pour rejouer</p>';
      messageEl.style.display = 'block';
      return;
    }
  }

  // Score
  score += 0.1;
  scoreEl.textContent = String(Math.floor(score)).padStart(5, '0');
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  drawClouds();
  drawGround();

  obstacles.forEach(ob => {
    if (ob.bird) drawBird(ob);
    else drawCactus(ob);
  });

  drawDino();
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

function jump() {
  if (!dino.jumping) {
    dino.jumping = true;
    dino.vy = dino.ducking ? DUCK_JUMP_FORCE : JUMP_FORCE;
    // Stretch on takeoff
    dino.squash = 1.2;
    dino.squashVel = 0.1;
  }
}

function startGame() {
  reset();
  gameState = 'running';
  messageEl.style.display = 'none';
}

// Input
document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp') {
    e.preventDefault();
    if (gameState === 'idle' || gameState === 'over') startGame();
    else if (gameState === 'running') jump();
  }
  if (e.code === 'ArrowDown') {
    e.preventDefault();
    if (gameState === 'running') dino.ducking = true;
  }
});

document.addEventListener('keyup', e => {
  if (e.code === 'ArrowDown') dino.ducking = false;
});

// Touch support
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (gameState === 'idle' || gameState === 'over') startGame();
  else if (gameState === 'running') jump();
});

loop();
</script>
</body>
</html>
