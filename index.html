<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alex Runner</title>
<style>
  :root {
    --bg-start: #FFE5EC;
    --bg-end: #E0ECFF;
    --canvas-bg: #FFF8F2;
    --accent: #6C5CE7;
    --accent-2: #FF7675;
    --text: #2D3436;
    --muted: #9B8FB3;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: linear-gradient(135deg, var(--bg-start) 0%, var(--bg-end) 100%);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: 'Courier New', monospace;
    overflow: hidden;
  }
  #game-wrapper {
    position: relative;
    width: 800px;
    max-width: 100vw;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 12px;
    background: rgba(255, 255, 255, 0.45);
    border-radius: 18px;
    box-shadow: 0 10px 40px rgba(108, 92, 231, 0.18);
    backdrop-filter: blur(8px);
  }
  canvas {
    display: block;
    background: var(--canvas-bg);
    width: 100%;
    height: auto;
    border-radius: 12px;
    box-shadow: inset 0 2px 8px rgba(108, 92, 231, 0.08);
  }
  #score {
    position: absolute;
    top: 22px;
    right: 28px;
    font-size: 18px;
    color: var(--accent);
    letter-spacing: 2px;
    font-weight: bold;
    text-shadow: 0 1px 0 rgba(255, 255, 255, 0.8);
  }
  #message {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    color: var(--text);
    pointer-events: none;
  }
  #message h2 {
    font-size: 26px;
    margin-bottom: 8px;
    color: var(--accent);
    letter-spacing: 2px;
  }
  #message p { font-size: 14px; color: var(--muted); }

  /* Birthday gate */
  #birth-screen {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: linear-gradient(135deg, var(--bg-start) 0%, var(--bg-end) 100%);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 10;
    color: var(--text);
    border-radius: 18px;
  }
  #birth-screen h2 {
    font-size: 26px;
    margin-bottom: 16px;
    color: var(--accent);
    letter-spacing: 3px;
  }
  #birth-screen input {
    font-family: 'Courier New', monospace;
    font-size: 20px;
    text-align: center;
    padding: 10px 16px;
    border: 2px solid var(--accent);
    background: #fff;
    color: var(--text);
    letter-spacing: 2px;
    width: 200px;
    outline: none;
    border-radius: 8px;
    box-shadow: 0 4px 12px rgba(108, 92, 231, 0.15);
    transition: box-shadow 0.2s;
  }
  #birth-screen input:focus {
    box-shadow: 0 4px 20px rgba(108, 92, 231, 0.35);
  }
  #birth-screen input::placeholder { color: var(--muted); }
  #birth-error {
    margin-top: 10px;
    font-size: 13px;
    color: var(--accent-2);
    height: 18px;
    font-weight: bold;
  }

  /* Mobile buttons */
  #mobile-controls {
    position: relative;
    display: none;
    gap: 12px;
    margin-top: 15px;
  }
  .mobile-btn {
    padding: 14px 24px;
    font-size: 16px;
    font-family: 'Courier New', monospace;
    background: linear-gradient(135deg, var(--accent), #8B7FE8);
    color: #fff;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    touch-action: manipulation;
    user-select: none;
    font-weight: bold;
    letter-spacing: 1px;
    box-shadow: 0 4px 12px rgba(108, 92, 231, 0.35);
    transition: transform 0.1s, box-shadow 0.1s;
  }
  .mobile-btn#duck-btn {
    background: linear-gradient(135deg, var(--accent-2), #FFA5A4);
    box-shadow: 0 4px 12px rgba(255, 118, 117, 0.35);
  }
  .mobile-btn:active {
    transform: translateY(2px);
    box-shadow: 0 2px 6px rgba(108, 92, 231, 0.25);
  }

  @media (max-width: 768px) {
    #mobile-controls {
      display: flex;
    }
  }
</style>
</head>
<body>
<div id="game-wrapper">
  <div id="birth-screen">
    <h2>ALEX RUNNER</h2>
    <p style="margin-bottom:12px;font-size:14px">Entre ta date de naissance pour jouer</p>
    <input type="text" id="birth-input" placeholder="JJ/MM/AAAA" maxlength="10" autocomplete="off">
    <div id="birth-error"></div>
  </div>
  <canvas id="game" width="800" height="250"></canvas>
  <div id="score">00000</div>
  <div id="message">
    <h2>ALEX RUNNER</h2>
    <p>Appuie sur Espace ou touche l'ecran pour jouer</p>
  </div>
  <div id="mobile-controls">
    <button class="mobile-btn" id="jump-btn">SAUTER</button>
    <button class="mobile-btn" id="duck-btn">GLISSER</button>
  </div>
  <audio id="jump-sound" preload="auto">
    <source src="nut_nut.mp3" type="audio/mpeg">
  </audio>
</div>

<script>
// === CONFIGURATION ===
const COLLISION_ENABLED = true;   // false = le joueur ne meurt pas en touchant les obstacles
const DATE_REQUIRED = true;       // false = pas besoin d'entrer la date pour jouer

// Birthday gate
const birthScreen = document.getElementById('birth-screen');
const birthInput = document.getElementById('birth-input');
const birthError = document.getElementById('birth-error');
const VALID_DATE = '04/04/1996';
const BIRTH_DATE_ERROR_MSG = "Ce n'est pas la bonne date, c'est un clin d'oeil 😉";

// Auto-format input as JJ/MM/AAAA
birthInput.addEventListener('input', e => {
  let v = birthInput.value.replace(/[^0-9]/g, '');
  if (v.length > 8) v = v.slice(0, 8);
  if (v.length >= 5) v = v.slice(0, 2) + '/' + v.slice(2, 4) + '/' + v.slice(4);
  else if (v.length >= 3) v = v.slice(0, 2) + '/' + v.slice(2);
  birthInput.value = v;
  birthError.textContent = '';

  if (v.length === 10) {
    if (v === VALID_DATE) {
      birthScreen.style.display = 'none';
    } else {
      birthError.textContent = BIRTH_DATE_ERROR_MSG;
      birthInput.value = '';
    }
  }
});

birthInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && birthInput.value.length === 10) {
    if (birthInput.value === VALID_DATE) {
      birthScreen.style.display = 'none';
    } else {
      birthError.textContent = BIRTH_DATE_ERROR_MSG;
      birthInput.value = '';
    }
  }
});

if (!DATE_REQUIRED) {
  birthScreen.style.display = 'none';
} else {
  birthInput.focus();
}

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const messageEl = document.getElementById('message');

const W = 800, H = 250;
const GROUND_Y = 220;
const GRAVITY = 0.6;
const JUMP_FORCE = -12;
const DUCK_JUMP_FORCE = -10;

let gameState = 'idle'; // idle | running | over
let score = 0;
let highScore = 0;
let speed = 6;
let frame = 0;
let groundOffset = 0;

// Alex head image
const alexHead = new Image();
alexHead.src = 'alex_detoure.png';

// Runner (Alex)
const dino = {
  x: 60, y: GROUND_Y, w: 28, h: 72,
  vy: 0, jumping: false, ducking: false,
  legFrame: 0,
  // Smooth animation state
  runCycle: 0,        // continuous running cycle (radians)
  squash: 1,          // vertical scale (1 = normal, <1 = squashed, >1 = stretched)
  squashVel: 0,       // spring velocity for squash recovery
  lean: 0,            // body lean angle (radians)
  landTimer: 0,       // frames since landing (for impact effect)
  wasJumping: false,   // track jump->land transition
  jumpHoldFrames: 0,  // how long jump is held for variable height
  armSwing: 0         // smooth arm angle
};

// Obstacles
let obstacles = [];
let nextObstacleIn = 0;

// Clouds
let clouds = [];
for (let i = 0; i < 5; i++) {
  clouds.push({
    x: Math.random() * W,
    y: 15 + Math.random() * 60,
    scale: 0.7 + Math.random() * 0.7
  });
}

function reset() {
  dino.y = GROUND_Y;
  dino.vy = 0;
  dino.jumping = false;
  dino.ducking = false;
  dino.runCycle = 0;
  dino.squash = 1;
  dino.squashVel = 0;
  dino.lean = 0;
  dino.landTimer = 0;
  dino.wasJumping = false;
  dino.jumpHoldFrames = 0;
  dino.armSwing = 0;
  obstacles = [];
  nextObstacleIn = 60;
  score = 0;
  speed = 6;
  frame = 0;
}

// Drawing helpers

// Helper: draw a limb pivoting from its TOP (shoulder/hip), hanging down
function drawLimb(pivotX, pivotY, w, h, angle) {
  ctx.save();
  ctx.translate(pivotX, pivotY);
  ctx.rotate(angle);
  ctx.beginPath();
  const r = Math.min(w, h) * 0.35;
  ctx.roundRect(-w / 2, 0, w, h, r);
  ctx.fill();
  ctx.restore();
}

// Character colors
const COL_SKIN = '#E8C39E';
const COL_TSHIRT = '#3B7DD8';
const COL_SHORT = '#D63031';
const COL_SHOES = '#2D3436';

function drawDino() {
  const HEAD_SIZE = 36;

  // Update running cycle (speed-dependent for realistic cadence)
  if (!dino.jumping && !dino.ducking && gameState === 'running') {
    dino.runCycle += speed * 0.025;
    dino.landTimer++;
  }

  // Squash & stretch spring physics
  const squashTarget = 1;
  const squashSpring = 0.3;
  const squashDamp = 0.65;
  dino.squashVel += (squashTarget - dino.squash) * squashSpring;
  dino.squashVel *= squashDamp;
  dino.squash += dino.squashVel;

  // Smooth lean: lean forward while running, back while ascending, forward while falling
  let targetLean = 0;
  if (dino.jumping) {
    targetLean = dino.vy < 0 ? -0.08 : 0.1;
  } else if (gameState === 'running' && !dino.ducking) {
    targetLean = 0.05 + Math.sin(dino.runCycle) * 0.02;
  }
  dino.lean += (targetLean - dino.lean) * 0.15;

  // Running body bob
  const bob = (!dino.jumping && !dino.ducking && gameState === 'running')
    ? Math.abs(Math.sin(dino.runCycle)) * 1.2 : 0;

  // Sine-based cycle values for smooth limb motion
  const legSin = Math.sin(dino.runCycle);
  const legCos = Math.cos(dino.runCycle);
  const armSin = Math.sin(dino.runCycle + Math.PI); // arms opposite to legs

  if (dino.ducking && !dino.jumping) {
    // === SLIDE POSE: feet first, leaning back, one arm up ===
    const dw = 48, dh = 24;
    const dy = GROUND_Y - dh;
    dino.w = dw; dino.h = dh;
    dino.drawY = dy;

    const cx = dino.x + 20;
    const cy = GROUND_Y;

    // Torso (tilted back ~30deg) - T-shirt bleu
    ctx.fillStyle = COL_TSHIRT;
    ctx.save();
    ctx.translate(cx, cy - 12);
    ctx.rotate(-0.4);
    ctx.beginPath();
    ctx.roundRect(-8, -12, 16, 22, 3);
    ctx.fill();
    ctx.restore();

    // Legs extended forward (feet first) - beige
    ctx.fillStyle = COL_SKIN;
    const hipX = cx + 5;
    const hipY = cy - 6;
    drawLimb(hipX, hipY, 7, 16, -1.2);
    drawLimb(hipX + 2, hipY, 7, 16, -1.35);

    // Short rouge par-dessus la hanche (petit carre tourne)
    ctx.fillStyle = COL_SHORT;
    ctx.save();
    ctx.translate(hipX + 1, hipY);
    ctx.rotate(-1.25);
    ctx.beginPath();
    ctx.roundRect(-5, -4, 10, 10, 2);
    ctx.fill();
    ctx.restore();

    // Arms - beige
    ctx.fillStyle = COL_SKIN;
    const shoulderLX = cx - 8;
    const shoulderLY = cy - 20;
    drawLimb(shoulderLX, shoulderLY, 5, 13, 2.6);

    const shoulderRX = cx - 4;
    const shoulderRY = cy - 14;
    drawLimb(shoulderRX, shoulderRY, 5, 10, 0.8);

    // Head (photo) - tilted back
    const headX = cx - 10;
    const headY = cy - 28;
    ctx.save();
    ctx.translate(headX, headY);
    ctx.rotate(-0.3);
    ctx.drawImage(alexHead, -HEAD_SIZE / 2, -HEAD_SIZE / 2, HEAD_SIZE, HEAD_SIZE);
    ctx.restore();

  } else {
    // === STANDING / RUNNING / JUMPING POSE ===
    dino.w = 28; dino.h = 72;
    const baseY = dino.y - bob;
    const dy = baseY - dino.h * dino.squash;
    dino.drawY = dy;

    // Apply squash & stretch: scale around feet
    ctx.save();
    const pivotX = dino.x + 14;
    const pivotY = dino.y; // feet stay on ground
    ctx.translate(pivotX, pivotY);
    ctx.rotate(dino.lean);
    // Squash: wider when squashed, narrower when stretched
    const sx = 1 + (1 - dino.squash) * 0.5;
    ctx.scale(sx, dino.squash);
    ctx.translate(-pivotX, -pivotY);

    const bodyTop = dino.y - dino.h;

    const hipY = bodyTop + HEAD_SIZE + 15;
    const shoulderY = bodyTop + HEAD_SIZE + 3;
    const LEG_LEN = 16;
    const ARM_LEN = 15;
    const SKIN_BACK = '#C99E78';

    if (dino.jumping) {
      // === FRONT VIEW (saut) : deux jambes + deux bras en Y ===
      const hipLX = dino.x + 8;
      const hipRX = dino.x + 20;
      const shoulderLX = dino.x + 4;
      const shoulderRX = dino.x + 24;

      // Torso
      ctx.fillStyle = COL_TSHIRT;
      ctx.beginPath();
      ctx.roundRect(dino.x + 5, bodyTop + HEAD_SIZE - 8, 18, 23, 3);
      ctx.fill();

      // Legs bent slightly back - beige
      ctx.fillStyle = COL_SKIN;
      drawLimb(hipLX, hipY, 6, LEG_LEN, 0.35);
      drawLimb(hipRX, hipY, 6, LEG_LEN, 0.25);

      // Short rouge
      ctx.fillStyle = COL_SHORT;
      ctx.beginPath();
      ctx.roundRect(dino.x + 5, hipY - 2, 18, 9, 3);
      ctx.fill();

      // Arms in Y (outward)
      ctx.fillStyle = COL_SKIN;
      drawLimb(shoulderLX, shoulderY, 5, ARM_LEN, 2.5);
      drawLimb(shoulderRX, shoulderY, 5, ARM_LEN, -2.5);
    } else {
      // === SIDE VIEW (course) : membre arriere -> torse -> membre avant ===
      const hipX = dino.x + 14;
      const shoulderX = dino.x + 14;

      const frontLegAngle = legSin * 0.4;
      const backLegAngle = -legSin * 0.4;
      const frontArmAngle = -legSin * 0.55;
      const backArmAngle = legSin * 0.55;

      // BACK leg (darker)
      ctx.fillStyle = SKIN_BACK;
      drawLimb(hipX, hipY, 6, LEG_LEN, backLegAngle);

      // BACK arm (darker)
      drawLimb(shoulderX, shoulderY, 4, ARM_LEN, backArmAngle);

      // Torso
      ctx.fillStyle = COL_TSHIRT;
      ctx.beginPath();
      ctx.roundRect(dino.x + 5, bodyTop + HEAD_SIZE - 8, 18, 23, 3);
      ctx.fill();

      // Short rouge
      ctx.fillStyle = COL_SHORT;
      ctx.beginPath();
      ctx.roundRect(dino.x + 5, hipY - 2, 18, 9, 3);
      ctx.fill();

      // FRONT leg (normal)
      ctx.fillStyle = COL_SKIN;
      drawLimb(hipX, hipY, 7, LEG_LEN, frontLegAngle);

      // FRONT arm (normal)
      drawLimb(shoulderX, shoulderY, 5, ARM_LEN, frontArmAngle);
    }

    // Head (photo) with slight bob - drawn last so it appears on top
    const headCx = dino.x + 14;
    const headCy = bodyTop + HEAD_SIZE / 2;
    const headTilt = dino.jumping ? dino.vy * 0.01 : Math.sin(dino.runCycle * 2) * 0.04;
    ctx.save();
    ctx.translate(headCx, headCy);
    ctx.rotate(headTilt);
    ctx.drawImage(alexHead, -HEAD_SIZE / 2, -HEAD_SIZE / 2, HEAD_SIZE, HEAD_SIZE);
    ctx.restore();

    ctx.restore(); // end squash/stretch transform
  }
}

function drawCactusArm(cx, baseY, topY, width, side) {
  // side: -1 = left, 1 = right
  const r = width / 2;
  const elbowY = (baseY + topY) / 2;
  const armCx = cx + side * (r + 4);

  // Rounded vertical part
  ctx.beginPath();
  ctx.moveTo(armCx - r, elbowY);
  ctx.lineTo(armCx - r, topY + r);
  ctx.arc(armCx, topY + r, r, Math.PI, 0);
  ctx.lineTo(armCx + r, elbowY);
  ctx.closePath();
  ctx.fill();

  // Horizontal bend toward trunk
  ctx.beginPath();
  ctx.roundRect(
    side === -1 ? armCx - r : cx,
    elbowY,
    Math.abs(armCx - cx) + r,
    width,
    r * 0.6
  );
  ctx.fill();
}

function drawCactusTrunk(x, width, height) {
  const r = width / 2;
  const topY = GROUND_Y - height;
  ctx.beginPath();
  ctx.moveTo(x, GROUND_Y);
  ctx.lineTo(x, topY + r);
  ctx.arc(x + r, topY + r, r, Math.PI, 0);
  ctx.lineTo(x + width, GROUND_Y);
  ctx.closePath();
  ctx.fill();
}

function drawCactusRibs(x, width, height, color) {
  ctx.strokeStyle = color;
  ctx.lineWidth = 1;
  const topY = GROUND_Y - height + width / 2;
  // Vertical rib lines
  for (let i = 1; i < 3; i++) {
    const rx = x + (width * i) / 3;
    ctx.beginPath();
    ctx.moveTo(rx, topY);
    ctx.lineTo(rx, GROUND_Y - 2);
    ctx.stroke();
  }
}

function drawSpines(x, y, n, color) {
  ctx.strokeStyle = color;
  ctx.lineWidth = 1;
  for (let i = 0; i < n; i++) {
    const sx = x + (i * 3);
    ctx.beginPath();
    ctx.moveTo(sx, y);
    ctx.lineTo(sx - 1, y - 2);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(sx, y);
    ctx.lineTo(sx + 1, y - 2);
    ctx.stroke();
  }
}

function drawCactus(ob) {
  const GREEN = '#3E9142';
  const GREEN_DARK = '#2E6B32';
  const GREEN_LIGHT = '#5FB866';

  if (ob.type === 'small') {
    const x = ob.x, h = 34, w = 12;
    ctx.fillStyle = GREEN;
    drawCactusTrunk(x + 4, w, h);
    drawCactusArm(x + 4 + w / 2, GROUND_Y - 22, GROUND_Y - 30, 6, -1);
    drawCactusArm(x + 4 + w / 2, GROUND_Y - 28, GROUND_Y - 36, 6, 1);
    // Highlight stripe
    ctx.fillStyle = GREEN_LIGHT;
    ctx.fillRect(x + 5, GROUND_Y - h + 7, 2, h - 9);
    // Ribs
    drawCactusRibs(x + 4, w, h, GREEN_DARK);
  } else if (ob.type === 'large') {
    const x = ob.x, h = 46, w = 16;
    ctx.fillStyle = GREEN;
    drawCactusTrunk(x + 2, w, h);
    drawCactusArm(x + 2 + w / 2, GROUND_Y - 30, GROUND_Y - 40, 8, -1);
    drawCactusArm(x + 2 + w / 2, GROUND_Y - 38, GROUND_Y - 48, 8, 1);
    ctx.fillStyle = GREEN_LIGHT;
    ctx.fillRect(x + 3, GROUND_Y - h + 9, 2, h - 11);
    drawCactusRibs(x + 2, w, h, GREEN_DARK);
    // Small flower on top
    ctx.fillStyle = '#FF7675';
    ctx.beginPath();
    ctx.arc(x + 2 + w / 2, GROUND_Y - h - 2, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#FFE66D';
    ctx.beginPath();
    ctx.arc(x + 2 + w / 2, GROUND_Y - h - 2, 1.2, 0, Math.PI * 2);
    ctx.fill();
  } else if (ob.type === 'double') {
    // First cactus
    ctx.fillStyle = GREEN;
    drawCactusTrunk(ob.x, 10, 34);
    drawCactusArm(ob.x + 5, GROUND_Y - 24, GROUND_Y - 32, 6, 1);
    // Second cactus (taller)
    drawCactusTrunk(ob.x + 18, 10, 42);
    drawCactusArm(ob.x + 23, GROUND_Y - 30, GROUND_Y - 40, 6, -1);
    // Highlights
    ctx.fillStyle = GREEN_LIGHT;
    ctx.fillRect(ob.x + 1, GROUND_Y - 27, 2, 24);
    ctx.fillRect(ob.x + 19, GROUND_Y - 35, 2, 30);
    // Ribs
    drawCactusRibs(ob.x, 10, 34, GREEN_DARK);
    drawCactusRibs(ob.x + 18, 10, 42, GREEN_DARK);
  }
}

// Pingu le pingouin (remplace les oiseaux)
function drawBird(ob) {
  const BLACK = '#1C1C1C';
  const WHITE = '#FFFFFF';
  const ORANGE = '#FF8C00';
  const ORANGE_D = '#D46E00';

  const cx = ob.x + ob.w / 2;
  const topY = ob.y;
  const bottomY = ob.y + ob.h;

  // Petit bobbing vertical + mini waddle
  const bob = Math.sin(frame * 0.15) * 1.5;
  const tilt = Math.sin(frame * 0.15) * 0.08;
  const flipperFlap = Math.sin(frame * 0.3) * 0.6;

  ctx.save();
  ctx.translate(cx, bottomY - 4 + bob);
  ctx.rotate(tilt);

  // === PIEDS (orange) ===
  ctx.fillStyle = ORANGE;
  // Pied gauche
  ctx.beginPath();
  ctx.ellipse(-4, 3, 5, 2.5, 0, 0, Math.PI * 2);
  ctx.fill();
  // Pied droit
  ctx.beginPath();
  ctx.ellipse(5, 3, 5, 2.5, 0, 0, Math.PI * 2);
  ctx.fill();

  // === CORPS (ovale noir) ===
  const bodyH = ob.h - 6;
  ctx.fillStyle = BLACK;
  ctx.beginPath();
  ctx.ellipse(0, -bodyH / 2 + 2, ob.w / 2 - 2, bodyH / 2, 0, 0, Math.PI * 2);
  ctx.fill();

  // === VENTRE BLANC ===
  ctx.fillStyle = WHITE;
  ctx.beginPath();
  ctx.ellipse(0, -bodyH / 2 + 3, ob.w / 2 - 5, bodyH / 2 - 3, 0, 0, Math.PI * 2);
  ctx.fill();

  // === TETE (bien distincte, plus grande) ===
  const headY = -bodyH + 1;
  const headR = ob.w / 2 - 1;
  ctx.fillStyle = BLACK;
  ctx.beginPath();
  ctx.arc(0, headY, headR, 0, Math.PI * 2);
  ctx.fill();

  // === BEC ORANGE (pointant vers la gauche - direction de deplacement) ===
  ctx.fillStyle = ORANGE;
  ctx.beginPath();
  ctx.moveTo(-headR + 2, headY);
  ctx.lineTo(-headR - 4, headY - 1);
  ctx.lineTo(-headR - 4, headY + 2);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = ORANGE_D;
  ctx.beginPath();
  ctx.moveTo(-headR + 2, headY + 1);
  ctx.lineTo(-headR - 4, headY + 2);
  ctx.lineTo(-headR - 2, headY + 2);
  ctx.closePath();
  ctx.fill();

  // === YEUX (deux gros yeux blancs avec pupilles) ===
  ctx.fillStyle = WHITE;
  ctx.beginPath();
  ctx.arc(-3, headY - 1, 2.8, 0, Math.PI * 2);
  ctx.arc(3, headY - 1, 2.8, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = BLACK;
  ctx.beginPath();
  ctx.arc(-3, headY - 1, 1.5, 0, Math.PI * 2);
  ctx.arc(3, headY - 1, 1.5, 0, Math.PI * 2);
  ctx.fill();
  // Reflet blanc dans les yeux
  ctx.fillStyle = WHITE;
  ctx.beginPath();
  ctx.arc(-2.5, headY - 1.5, 0.6, 0, Math.PI * 2);
  ctx.arc(3.5, headY - 1.5, 0.6, 0, Math.PI * 2);
  ctx.fill();

  // === NAGEOIRES (flippers) ===
  ctx.fillStyle = BLACK;
  // Nageoire gauche (devant)
  ctx.save();
  ctx.translate(-ob.w / 2 + 3, -bodyH / 2);
  ctx.rotate(flipperFlap);
  ctx.beginPath();
  ctx.ellipse(0, 2, 2.5, 7, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
  // Nageoire droite
  ctx.save();
  ctx.translate(ob.w / 2 - 3, -bodyH / 2);
  ctx.rotate(-flipperFlap);
  ctx.beginPath();
  ctx.ellipse(0, 2, 2.5, 7, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  ctx.restore();
}

function drawGround() {
  // Soft earth gradient below the line
  const grd = ctx.createLinearGradient(0, GROUND_Y, 0, H);
  grd.addColorStop(0, '#F5C9A8');
  grd.addColorStop(1, '#E8AE88');
  ctx.fillStyle = grd;
  ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);

  // Ground line
  ctx.strokeStyle = '#C88A6B';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(0, GROUND_Y);
  ctx.lineTo(W, GROUND_Y);
  ctx.stroke();

  // Pebbles/grains (warm tones)
  for (let i = 0; i < W + 20; i += 3) {
    const xp = (i - groundOffset % 20);
    if (Math.sin(xp * 0.5) > 0.7) {
      ctx.fillStyle = '#B87856';
      ctx.fillRect(xp, GROUND_Y + 4 + (xp % 5), 2, 1);
    }
  }

  // Scattered grass tufts (violet-green)
  ctx.strokeStyle = '#7B9E57';
  ctx.lineWidth = 1;
  for (let i = 0; i < W + 40; i += 40) {
    const xp = ((i - groundOffset * 0.8) % (W + 40));
    if (xp < 0) continue;
    ctx.beginPath();
    ctx.moveTo(xp, GROUND_Y);
    ctx.lineTo(xp - 1, GROUND_Y - 3);
    ctx.moveTo(xp, GROUND_Y);
    ctx.lineTo(xp, GROUND_Y - 4);
    ctx.moveTo(xp, GROUND_Y);
    ctx.lineTo(xp + 1, GROUND_Y - 3);
    ctx.stroke();
  }
}

function drawClouds() {
  clouds.forEach(c => {
    const s = c.scale || 1;
    ctx.save();
    ctx.translate(c.x, c.y);
    ctx.scale(s, s);

    // Soft shadow underneath
    ctx.fillStyle = 'rgba(108, 92, 231, 0.08)';
    ctx.beginPath();
    ctx.ellipse(22, 14, 28, 5, 0, 0, Math.PI * 2);
    ctx.fill();

    // Main cloud body (stacked circles for puffy shape)
    ctx.fillStyle = '#FFFFFF';
    ctx.beginPath();
    ctx.arc(10, 10, 10, 0, Math.PI * 2);
    ctx.arc(22, 6, 13, 0, Math.PI * 2);
    ctx.arc(36, 9, 10, 0, Math.PI * 2);
    ctx.arc(28, 13, 11, 0, Math.PI * 2);
    ctx.arc(16, 13, 9, 0, Math.PI * 2);
    ctx.fill();

    // Subtle highlight (top-left, lighter tint)
    ctx.fillStyle = 'rgba(255, 228, 240, 0.6)';
    ctx.beginPath();
    ctx.arc(20, 3, 7, 0, Math.PI * 2);
    ctx.arc(12, 7, 5, 0, Math.PI * 2);
    ctx.fill();

    // Soft lavender tint underneath (depth)
    ctx.fillStyle = 'rgba(180, 170, 220, 0.25)';
    ctx.beginPath();
    ctx.arc(28, 16, 9, 0, Math.PI);
    ctx.arc(16, 16, 7, 0, Math.PI);
    ctx.fill();

    ctx.restore();
  });
}

function spawnObstacle() {
  const r = Math.random();
  let ob;
  if (r < 0.3) {
    ob = { x: W, type: 'small', w: 18, h: 34, bird: false };
  } else if (r < 0.55) {
    ob = { x: W, type: 'large', w: 28, h: 46, bird: false };
  } else if (r < 0.8) {
    ob = { x: W, type: 'double', w: 28, h: 42, bird: false };
  } else {
    // Pingu le pingouin en hauteur - il faut glisser dessous !
    ob = { x: W, y: GROUND_Y - 70, type: 'bird', w: 26, h: 36, bird: true };
    // Son "nut nut" a l'apparition
    const pinguSound = document.getElementById('jump-sound');
    if (pinguSound) {
      pinguSound.currentTime = 0;
      pinguSound.play().catch(() => {});
    }
  }
  obstacles.push(ob);
  nextObstacleIn = 40 + Math.random() * 60;
}

function checkCollision(ob) {
  // Dino hitbox
  let dx, dy, dw, dh;
  if (dino.ducking && !dino.jumping) {
    dw = 40; dh = 20;
    dx = dino.x + 2;
    dy = GROUND_Y - dh + 2;
    dw -= 4; dh -= 4;
  } else {
    dx = dino.x + 6;
    dy = dino.y - dino.h + 6;
    dw = dino.w - 12;
    dh = dino.h - 6;
  }

  // Obstacle hitbox
  let ox, oy, ow, oh;
  if (ob.bird) {
    ox = ob.x + 2; oy = ob.y + 2; ow = ob.w - 4; oh = ob.h - 4;
  } else {
    ox = ob.x + 2;
    oy = GROUND_Y - ob.h + 2;
    ow = ob.w - 4;
    oh = ob.h - 4;
  }

  return dx < ox + ow && dx + dw > ox && dy < oy + oh && dy + dh > oy;
}

function update() {
  if (gameState !== 'running') return;

  frame++;
  groundOffset += speed;

  // Speed up over time
  speed = 6 + score * 0.002;
  if (speed > 14) speed = 14;

  // Dino physics
  if (dino.jumping) {
    dino.vy += GRAVITY;
    dino.y += dino.vy;
    dino.wasJumping = true;
    if (dino.y >= GROUND_Y) {
      dino.y = GROUND_Y;
      // Landing impact: squash proportional to fall speed
      const impactForce = Math.min(dino.vy * 0.04, 0.25);
      dino.squash = 1 - impactForce;
      dino.squashVel = -impactForce * 0.5;
      dino.vy = 0;
      dino.jumping = false;
      dino.landTimer = 0;
    }
  }

  // Clouds
  clouds.forEach(c => {
    c.x -= speed * 0.2;
    if (c.x < -50) { c.x = W + Math.random() * 100; c.y = 20 + Math.random() * 50; }
  });

  // Obstacles
  nextObstacleIn -= 1;
  if (nextObstacleIn <= 0) spawnObstacle();

  obstacles.forEach(ob => { ob.x -= speed; });
  obstacles = obstacles.filter(ob => ob.x > -50);

  // Collision
  for (const ob of obstacles) {
    if (COLLISION_ENABLED && checkCollision(ob)) {
      gameState = 'over';
      if (score > highScore) highScore = score;
      messageEl.innerHTML = '<h2>GAME OVER</h2><p>Score: ' + String(Math.floor(score)).padStart(5, '0') +
        (highScore > 0 ? ' | Record: ' + String(Math.floor(highScore)).padStart(5, '0') : '') +
        '</p><p style="margin-top:8px">Appuie sur Espace pour rejouer</p>';
      messageEl.style.display = 'block';
      return;
    }
  }

  // Score
  score += 0.1;
  scoreEl.textContent = String(Math.floor(score)).padStart(5, '0');
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  // Soft sky gradient (pink → blue) matching the UI palette
  const sky = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
  sky.addColorStop(0, '#FFE5EC');
  sky.addColorStop(0.5, '#F4E9FF');
  sky.addColorStop(1, '#E0ECFF');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, GROUND_Y);

  // Distant sun/halo
  ctx.fillStyle = 'rgba(255, 200, 180, 0.35)';
  ctx.beginPath();
  ctx.arc(W - 110, 55, 40, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = 'rgba(255, 180, 160, 0.5)';
  ctx.beginPath();
  ctx.arc(W - 110, 55, 24, 0, Math.PI * 2);
  ctx.fill();

  drawClouds();
  drawGround();

  obstacles.forEach(ob => {
    if (ob.bird) drawBird(ob);
    else drawCactus(ob);
  });

  drawDino();
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

function jump() {
  if (!dino.jumping) {
    dino.jumping = true;
    dino.vy = dino.ducking ? DUCK_JUMP_FORCE : JUMP_FORCE;
    // Stretch on takeoff
    dino.squash = 1.2;
    dino.squashVel = 0.1;
  }
}

function startGame() {
  reset();
  gameState = 'running';
  messageEl.style.display = 'none';
}

// Input
document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp') {
    e.preventDefault();
    if (gameState === 'idle' || gameState === 'over') startGame();
    else if (gameState === 'running') jump();
  }
  if (e.code === 'ArrowDown') {
    e.preventDefault();
    if (gameState === 'running') dino.ducking = true;
  }
});

document.addEventListener('keyup', e => {
  if (e.code === 'ArrowDown') dino.ducking = false;
});

// Touch support (tap = jump, swipe down = slide)
let touchStartY = 0;
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  touchStartY = e.touches[0].clientY;
  if (gameState === 'idle' || gameState === 'over') startGame();
});

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (gameState === 'running') {
    const dy = e.touches[0].clientY - touchStartY;
    if (dy > 30) dino.ducking = true;
  }
});

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (gameState === 'running') {
    dino.ducking = false;
    if (dy <= 30) jump();
  }
});

// Mobile buttons
const jumpBtn = document.getElementById('jump-btn');
const duckBtn = document.getElementById('duck-btn');

jumpBtn.addEventListener('click', () => {
  if (gameState === 'idle' || gameState === 'over') startGame();
  else if (gameState === 'running') jump();
});

jumpBtn.addEventListener('touchstart', (e) => {
  e.preventDefault();
  if (gameState === 'idle' || gameState === 'over') startGame();
  else if (gameState === 'running') jump();
});

duckBtn.addEventListener('touchstart', (e) => {
  e.preventDefault();
  if (gameState === 'running') dino.ducking = true;
});

duckBtn.addEventListener('touchend', (e) => {
  e.preventDefault();
  dino.ducking = false;
});

duckBtn.addEventListener('mousedown', () => {
  if (gameState === 'running') dino.ducking = true;
});

duckBtn.addEventListener('mouseup', () => {
  dino.ducking = false;
});

loop();
</script>
</body>
