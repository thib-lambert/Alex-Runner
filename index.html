<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#D6EAF8">
<title>Alex Runner</title>
<style>
  :root {
    --bg-start: #D6EAF8;
    --bg-end: #F0F8FF;
    --canvas-bg: #F2F9FF;
    --accent: #4A90E2;
    --accent-2: #E74C6B;
    --text: #1A3A5C;
    --muted: #8BA8C4;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    overscroll-behavior: none;
    -webkit-tap-highlight-color: transparent;
  }

  body {
    background: linear-gradient(135deg, var(--bg-start) 0%, var(--bg-end) 100%);
    font-family: 'Courier New', monospace;
    display: flex;
    justify-content: center;
    align-items: center;
    padding:
      max(env(safe-area-inset-top), 8px)
      max(env(safe-area-inset-right), 8px)
      max(env(safe-area-inset-bottom), 8px)
      max(env(safe-area-inset-left), 8px);
  }

  /* Mobile-first: full width, stacked, no decorative card */
  #game-wrapper {
    position: relative;
    width: 100%;
    max-width: 900px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }

  /* Canvas: responsive with fixed aspect ratio (800:250 = 3.2:1) */
  canvas {
    display: block;
    background: var(--canvas-bg);
    width: 100%;
    height: auto;
    aspect-ratio: 800 / 250;
    max-height: 60vh;
    border-radius: 12px;
    box-shadow:
      inset 0 2px 8px rgba(74, 144, 226, 0.12),
      0 6px 20px rgba(74, 144, 226, 0.2);
    touch-action: none;
  }

  /* Score overlay: fluid sizing */
  #score {
    position: absolute;
    top: clamp(8px, 2.2vw, 22px);
    right: clamp(12px, 3vw, 28px);
    font-size: clamp(12px, 2.2vw, 18px);
    color: var(--accent);
    letter-spacing: 2px;
    font-weight: bold;
    text-shadow: 0 1px 0 rgba(255, 255, 255, 0.8);
    pointer-events: none;
  }

  #message {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    color: var(--text);
    pointer-events: none;
    width: 90%;
  }
  #message h2 {
    font-size: clamp(16px, 3.5vw, 26px);
    margin-bottom: 6px;
    color: var(--accent);
    letter-spacing: 2px;
  }
  #message p {
    font-size: clamp(10px, 1.9vw, 14px);
    color: var(--muted);
  }

  /* Birthday gate: responsive */
  #birth-screen {
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, var(--bg-start) 0%, var(--bg-end) 100%);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 10;
    color: var(--text);
    border-radius: 12px;
    padding: 16px;
  }
  #birth-screen h2 {
    font-size: clamp(18px, 4vw, 26px);
    margin-bottom: 14px;
    color: var(--accent);
    letter-spacing: 3px;
    text-align: center;
  }
  #birth-screen p {
    text-align: center;
  }
  #birth-screen input {
    font-family: 'Courier New', monospace;
    font-size: clamp(16px, 3.5vw, 20px);
    text-align: center;
    padding: 10px 16px;
    border: 2px solid var(--accent);
    background: #fff;
    color: var(--text);
    letter-spacing: 2px;
    width: min(85%, 240px);
    outline: none;
    border-radius: 8px;
    box-shadow: 0 4px 12px rgba(74, 144, 226, 0.2);
    transition: box-shadow 0.2s;
  }
  #birth-screen input:focus {
    box-shadow: 0 4px 20px rgba(74, 144, 226, 0.4);
  }
  #birth-screen input::placeholder { color: var(--muted); }
  #birth-error {
    margin-top: 10px;
    font-size: clamp(11px, 2.3vw, 13px);
    color: var(--accent-2);
    min-height: 18px;
    font-weight: bold;
    text-align: center;
    padding: 0 8px;
  }

  /* Mobile controls: ON by default (mobile-first) */
  #mobile-controls {
    position: relative;
    display: flex;
    gap: 12px;
    width: 100%;
    max-width: 600px;
    padding: 0 4px;
  }
  .mobile-btn {
    flex: 1;
    padding: 16px 18px;
    min-height: 56px;
    font-size: clamp(14px, 2.6vw, 16px);
    font-family: 'Courier New', monospace;
    background: linear-gradient(135deg, var(--accent), #7FB8F0);
    color: #fff;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    touch-action: manipulation;
    user-select: none;
    -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent;
    font-weight: bold;
    letter-spacing: 1px;
    box-shadow: 0 4px 12px rgba(74, 144, 226, 0.4);
    transition: transform 0.1s, box-shadow 0.1s;
  }
  .mobile-btn#duck-btn {
    background: linear-gradient(135deg, var(--accent-2), #F5808F);
    box-shadow: 0 4px 12px rgba(231, 76, 107, 0.35);
  }
  .mobile-btn:active {
    transform: translateY(2px);
    box-shadow: 0 2px 6px rgba(74, 144, 226, 0.3);
  }

  /* Rotate-to-landscape prompt: hidden by default */
  #rotate-prompt {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 100;
    background: linear-gradient(135deg, var(--bg-start) 0%, var(--bg-end) 100%);
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 24px;
    text-align: center;
    color: var(--accent);
  }
  #rotate-prompt h2 {
    margin-top: 20px;
    font-size: clamp(20px, 5vw, 26px);
    letter-spacing: 3px;
    color: var(--accent);
  }
  #rotate-prompt p {
    margin-top: 8px;
    font-size: clamp(13px, 3.2vw, 15px);
    color: var(--muted);
    letter-spacing: 1px;
  }
  .rotate-icon {
    color: var(--accent);
    animation: rotatePhone 2.4s cubic-bezier(0.6, 0, 0.4, 1) infinite;
    transform-origin: center;
  }
  @keyframes rotatePhone {
    0%, 25%   { transform: rotate(0deg); }
    50%, 75%  { transform: rotate(-90deg); }
    100%      { transform: rotate(0deg); }
  }

  /* Force landscape on mobile portrait: show overlay, hide game */
  @media (orientation: portrait) and (max-width: 900px) {
    #rotate-prompt { display: flex; }
    #game-wrapper { display: none; }
  }

  /* Desktop with mouse/trackpad: decorative card + hide touch buttons */
  @media (min-width: 900px) and (hover: hover) and (pointer: fine) {
    body { padding: 20px; }
    #game-wrapper {
      padding: 14px;
      background: rgba(255, 255, 255, 0.45);
      border-radius: 18px;
      box-shadow: 0 10px 40px rgba(74, 144, 226, 0.25);
      backdrop-filter: blur(8px);
    }
    canvas { max-height: none; }
    #mobile-controls { display: none; }
  }

  /* Landscape mobile: reduce gap, cap canvas height so buttons stay visible */
  @media (orientation: landscape) and (max-height: 500px) {
    #game-wrapper { gap: 8px; }
    canvas { max-height: calc(100vh - 90px); }
    .mobile-btn { padding: 12px 16px; min-height: 48px; }
  }
</style>
</head>
<body>
<div id="rotate-prompt" aria-hidden="true">
  <div class="rotate-icon" aria-hidden="true">
    <svg viewBox="0 0 100 100" width="90" height="90">
      <rect x="34" y="8" width="32" height="84" rx="6" ry="6" fill="none" stroke="currentColor" stroke-width="3"/>
      <rect x="40" y="16" width="20" height="64" rx="1" fill="currentColor" opacity="0.15"/>
      <circle cx="50" cy="86" r="2.2" fill="currentColor"/>
    </svg>
  </div>
  <h2>Tourne ton appareil</h2>
  <p>Ce jeu se joue en mode paysage</p>
</div>
<div id="game-wrapper">
  <div id="birth-screen">
    <h2>ALEX RUNNER</h2>
    <p style="margin-bottom:12px;font-size:14px">Entre ta date de naissance pour jouer</p>
    <input type="text" id="birth-input" placeholder="JJ/MM/AAAA" maxlength="10" autocomplete="off">
    <div id="birth-error"></div>
  </div>
  <canvas id="game" width="800" height="250"></canvas>
  <div id="score">00000</div>
  <div id="message">
    <h2>ALEX RUNNER</h2>
    <p>Appuie sur Espace ou touche l'ecran pour jouer</p>
  </div>
  <div id="mobile-controls">
    <button class="mobile-btn" id="jump-btn">SAUTER</button>
    <button class="mobile-btn" id="duck-btn">GLISSER</button>
  </div>
  <audio id="jump-sound" preload="auto">
    <source src="nut_nut.mp3" type="audio/mpeg">
  </audio>
</div>

<script>
// === CONFIGURATION ===
const COLLISION_ENABLED = true;   // false = le joueur ne meurt pas en touchant les obstacles
const DATE_REQUIRED = true;       // false = pas besoin d'entrer la date pour jouer

// Birthday gate
const birthScreen = document.getElementById('birth-screen');
const birthInput = document.getElementById('birth-input');
const birthError = document.getElementById('birth-error');
const VALID_DATE = '04/04/1996';
const BIRTH_DATE_ERROR_MSG = "Ce n'est pas la bonne date, c'est un clin d'oeil 😉";

// Auto-format input as JJ/MM/AAAA
birthInput.addEventListener('input', e => {
  let v = birthInput.value.replace(/[^0-9]/g, '');
  if (v.length > 8) v = v.slice(0, 8);
  if (v.length >= 5) v = v.slice(0, 2) + '/' + v.slice(2, 4) + '/' + v.slice(4);
  else if (v.length >= 3) v = v.slice(0, 2) + '/' + v.slice(2);
  birthInput.value = v;
  birthError.textContent = '';

  if (v.length === 10) {
    if (v === VALID_DATE) {
      birthScreen.style.display = 'none';
    } else {
      birthError.textContent = BIRTH_DATE_ERROR_MSG;
      birthInput.value = '';
    }
  }
});

birthInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && birthInput.value.length === 10) {
    if (birthInput.value === VALID_DATE) {
      birthScreen.style.display = 'none';
    } else {
      birthError.textContent = BIRTH_DATE_ERROR_MSG;
      birthInput.value = '';
    }
  }
});

if (!DATE_REQUIRED) {
  birthScreen.style.display = 'none';
} else {
  birthInput.focus();
}

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const messageEl = document.getElementById('message');

const W = 800, H = 250;
const GROUND_Y = 220;
const GRAVITY = 0.6;
const JUMP_FORCE = -12;
const DUCK_JUMP_FORCE = -10;

let gameState = 'idle'; // idle | running | over
let score = 0;
let highScore = 0;
let speed = 6;
let frame = 0;
let groundOffset = 0;

// Theme system: 'ice' | 'desert' — swaps every 150 points via a door portal
let currentTheme = 'ice';
let nextThemeChange = 150;
let doorSpawned = false;
let themeFlash = 0; // white flash alpha on transition

// Alex head image
const alexHead = new Image();
alexHead.src = 'alex_detoure.png';

// Runner (Alex)
const dino = {
  x: 60, y: GROUND_Y, w: 28, h: 72,
  vy: 0, jumping: false, ducking: false,
  legFrame: 0,
  // Smooth animation state
  runCycle: 0,        // continuous running cycle (radians)
  squash: 1,          // vertical scale (1 = normal, <1 = squashed, >1 = stretched)
  squashVel: 0,       // spring velocity for squash recovery
  lean: 0,            // body lean angle (radians)
  landTimer: 0,       // frames since landing (for impact effect)
  wasJumping: false,   // track jump->land transition
  jumpHoldFrames: 0,  // how long jump is held for variable height
  armSwing: 0         // smooth arm angle
};

// Obstacles
let obstacles = [];
let nextObstacleIn = 0;

// Clouds
let clouds = [];
for (let i = 0; i < 5; i++) {
  clouds.push({
    x: Math.random() * W,
    y: 15 + Math.random() * 60,
    scale: 0.7 + Math.random() * 0.7
  });
}

// Snowflakes
let snowflakes = [];
for (let i = 0; i < 40; i++) {
  snowflakes.push({
    x: Math.random() * W,
    y: Math.random() * GROUND_Y,
    r: 0.8 + Math.random() * 1.8,
    vy: 0.3 + Math.random() * 0.8,
    drift: Math.random() * Math.PI * 2
  });
}

function reset() {
  dino.y = GROUND_Y;
  dino.vy = 0;
  dino.jumping = false;
  dino.ducking = false;
  dino.runCycle = 0;
  dino.squash = 1;
  dino.squashVel = 0;
  dino.lean = 0;
  dino.landTimer = 0;
  dino.wasJumping = false;
  dino.jumpHoldFrames = 0;
  dino.armSwing = 0;
  obstacles = [];
  nextObstacleIn = 60;
  score = 0;
  speed = 6;
  frame = 0;
  currentTheme = 'ice';
  nextThemeChange = 150;
  doorSpawned = false;
  themeFlash = 0;
}

// Drawing helpers

// Helper: draw a limb pivoting from its TOP (shoulder/hip), hanging down
function drawLimb(pivotX, pivotY, w, h, angle) {
  ctx.save();
  ctx.translate(pivotX, pivotY);
  ctx.rotate(angle);
  ctx.beginPath();
  const r = Math.min(w, h) * 0.35;
  ctx.roundRect(-w / 2, 0, w, h, r);
  ctx.fill();
  ctx.restore();
}

// Character colors
const COL_SKIN = '#E8C39E';
const COL_JACKET = '#1E5AA8';
const COL_JACKET_LIGHT = '#4A8BD8';
const COL_JACKET_DARK = '#12407A';
const COL_COLLAR = '#F2F6FA';
const COL_SHORT = '#D63031';
const COL_SHOES = '#2D3436';

// Draws a puffer jacket (matelassée) at local coords (x, y, w, h).
// side: 'front' shows a central zipper; 'side' hides it (profile view).
function drawJacket(x, y, w, h, side) {
  // Main body
  ctx.fillStyle = COL_JACKET;
  ctx.beginPath();
  ctx.roundRect(x, y, w, h, 4);
  ctx.fill();

  // Quilted segments: 3 horizontal bands with highlight + shadow line
  const segH = h / 3;
  for (let i = 0; i < 3; i++) {
    const yTop = y + segH * i;
    // Soft highlight at top of each segment
    ctx.fillStyle = COL_JACKET_LIGHT;
    ctx.beginPath();
    ctx.roundRect(x + 2, yTop + 1, w - 4, 2, 1);
    ctx.fill();
  }
  // Dark separator lines between segments
  ctx.strokeStyle = COL_JACKET_DARK;
  ctx.lineWidth = 1;
  for (let i = 1; i < 3; i++) {
    const yi = y + segH * i;
    ctx.beginPath();
    ctx.moveTo(x + 1.5, yi);
    ctx.lineTo(x + w - 1.5, yi);
    ctx.stroke();
  }

  // Fluffy collar (fourrure claire au col)
  ctx.fillStyle = COL_COLLAR;
  ctx.beginPath();
  ctx.roundRect(x + 1, y - 3, w - 2, 5, 2);
  ctx.fill();
  // Tiny shadow under collar
  ctx.fillStyle = 'rgba(0, 0, 0, 0.12)';
  ctx.fillRect(x + 2, y + 1, w - 4, 1);

  // Central zipper (only in front view)
  if (side === 'front') {
    ctx.strokeStyle = COL_JACKET_DARK;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(x + w / 2, y);
    ctx.lineTo(x + w / 2, y + h - 1);
    ctx.stroke();
  }
}

function drawDino() {
  const HEAD_SIZE = 36;

  // Drop shadow under feet (shrinks when jumping for weight feel)
  const shadowScale = dino.jumping
    ? Math.max(0.4, 1 - (GROUND_Y - dino.y) / 140)
    : 1;
  ctx.fillStyle = `rgba(0, 0, 0, ${0.18 * shadowScale})`;
  ctx.beginPath();
  ctx.ellipse(dino.x + 14, GROUND_Y + 2, 18 * shadowScale, 5 * shadowScale, 0, 0, Math.PI * 2);
  ctx.fill();

  // Update running cycle (speed-dependent for realistic cadence)
  if (!dino.jumping && !dino.ducking && gameState === 'running') {
    dino.runCycle += speed * 0.025;
    dino.landTimer++;
  }

  // Squash & stretch spring physics
  const squashTarget = 1;
  const squashSpring = 0.3;
  const squashDamp = 0.65;
  dino.squashVel += (squashTarget - dino.squash) * squashSpring;
  dino.squashVel *= squashDamp;
  dino.squash += dino.squashVel;

  // Smooth lean: lean forward while running, back while ascending, forward while falling
  let targetLean = 0;
  if (dino.jumping) {
    targetLean = dino.vy < 0 ? -0.08 : 0.1;
  } else if (gameState === 'running' && !dino.ducking) {
    targetLean = 0.05 + Math.sin(dino.runCycle) * 0.02;
  }
  dino.lean += (targetLean - dino.lean) * 0.15;

  // Running body bob
  const bob = (!dino.jumping && !dino.ducking && gameState === 'running')
    ? Math.abs(Math.sin(dino.runCycle)) * 1.2 : 0;

  // Sine-based cycle values for smooth limb motion
  const legSin = Math.sin(dino.runCycle);
  const legCos = Math.cos(dino.runCycle);
  const armSin = Math.sin(dino.runCycle + Math.PI); // arms opposite to legs

  if (dino.ducking && !dino.jumping) {
    // === SLIDE POSE: feet first, leaning back, one arm up ===
    const dw = 48, dh = 24;
    const dy = GROUND_Y - dh;
    dino.w = dw; dino.h = dh;
    dino.drawY = dy;

    const cx = dino.x + 20;
    const cy = GROUND_Y;

    // Torso (tilted back ~30deg) - doudoune bleue
    ctx.save();
    ctx.translate(cx, cy - 12);
    ctx.rotate(-0.4);
    drawJacket(-9, -12, 18, 22, 'front');
    ctx.restore();

    // Legs extended forward (feet first) - beige
    ctx.fillStyle = COL_SKIN;
    const hipX = cx + 5;
    const hipY = cy - 6;
    drawLimb(hipX, hipY, 7, 16, -1.2);
    drawLimb(hipX + 2, hipY, 7, 16, -1.35);

    // Short rouge par-dessus la hanche (petit carre tourne)
    ctx.fillStyle = COL_SHORT;
    ctx.save();
    ctx.translate(hipX + 1, hipY);
    ctx.rotate(-1.25);
    ctx.beginPath();
    ctx.roundRect(-5, -4, 10, 10, 2);
    ctx.fill();
    ctx.restore();

    // Arms - beige
    ctx.fillStyle = COL_SKIN;
    const shoulderLX = cx - 8;
    const shoulderLY = cy - 20;
    drawLimb(shoulderLX, shoulderLY, 5, 13, 2.6);

    const shoulderRX = cx - 4;
    const shoulderRY = cy - 14;
    drawLimb(shoulderRX, shoulderRY, 5, 10, 0.8);

    // Head (photo) - tilted back
    const headX = cx - 10;
    const headY = cy - 28;
    ctx.save();
    ctx.translate(headX, headY);
    ctx.rotate(-0.3);
    ctx.drawImage(alexHead, -HEAD_SIZE / 2, -HEAD_SIZE / 2, HEAD_SIZE, HEAD_SIZE);
    ctx.restore();

  } else {
    // === STANDING / RUNNING / JUMPING POSE ===
    dino.w = 28; dino.h = 72;
    const baseY = dino.y - bob;
    const dy = baseY - dino.h * dino.squash;
    dino.drawY = dy;

    // Apply squash & stretch: scale around feet
    ctx.save();
    const pivotX = dino.x + 14;
    const pivotY = dino.y; // feet stay on ground
    ctx.translate(pivotX, pivotY);
    ctx.rotate(dino.lean);
    // Squash: wider when squashed, narrower when stretched
    const sx = 1 + (1 - dino.squash) * 0.5;
    ctx.scale(sx, dino.squash);
    ctx.translate(-pivotX, -pivotY);

    const bodyTop = dino.y - dino.h;

    const hipY = bodyTop + HEAD_SIZE + 15;
    const shoulderY = bodyTop + HEAD_SIZE + 3;
    const LEG_LEN = 16;
    const ARM_LEN = 15;
    const SKIN_BACK = '#C99E78';

    if (dino.jumping) {
      // === FRONT VIEW (saut) : deux jambes + deux bras en Y ===
      const hipLX = dino.x + 8;
      const hipRX = dino.x + 20;
      const shoulderLX = dino.x + 4;
      const shoulderRX = dino.x + 24;

      // Torso (doudoune)
      drawJacket(dino.x + 4, bodyTop + HEAD_SIZE - 8, 20, 23, 'front');

      // Legs bent slightly back - beige
      ctx.fillStyle = COL_SKIN;
      drawLimb(hipLX, hipY, 6, LEG_LEN, 0.35);
      drawLimb(hipRX, hipY, 6, LEG_LEN, 0.25);

      // Short rouge
      ctx.fillStyle = COL_SHORT;
      ctx.beginPath();
      ctx.roundRect(dino.x + 5, hipY - 2, 18, 9, 3);
      ctx.fill();

      // Arms in Y (outward)
      ctx.fillStyle = COL_SKIN;
      drawLimb(shoulderLX, shoulderY, 5, ARM_LEN, 2.5);
      drawLimb(shoulderRX, shoulderY, 5, ARM_LEN, -2.5);
    } else {
      // === SIDE VIEW (course) : membre arriere -> torse -> membre avant ===
      const hipX = dino.x + 14;
      const shoulderX = dino.x + 14;

      const frontLegAngle = legSin * 0.4;
      const backLegAngle = -legSin * 0.4;
      const frontArmAngle = -legSin * 0.55;
      const backArmAngle = legSin * 0.55;

      // BACK leg (darker)
      ctx.fillStyle = SKIN_BACK;
      drawLimb(hipX, hipY, 6, LEG_LEN, backLegAngle);

      // BACK arm (darker)
      drawLimb(shoulderX, shoulderY, 4, ARM_LEN, backArmAngle);

      // Torso (doudoune - vue de cote, pas de zipper visible)
      drawJacket(dino.x + 4, bodyTop + HEAD_SIZE - 8, 20, 23, 'side');

      // Short rouge
      ctx.fillStyle = COL_SHORT;
      ctx.beginPath();
      ctx.roundRect(dino.x + 5, hipY - 2, 18, 9, 3);
      ctx.fill();

      // FRONT leg (normal)
      ctx.fillStyle = COL_SKIN;
      drawLimb(hipX, hipY, 7, LEG_LEN, frontLegAngle);

      // FRONT arm (normal)
      drawLimb(shoulderX, shoulderY, 5, ARM_LEN, frontArmAngle);
    }

    // Head (photo) with slight bob - drawn last so it appears on top
    const headCx = dino.x + 14;
    const headCy = bodyTop + HEAD_SIZE / 2;
    const headTilt = dino.jumping ? dino.vy * 0.01 : Math.sin(dino.runCycle * 2) * 0.04;
    ctx.save();
    ctx.translate(headCx, headCy);
    ctx.rotate(headTilt);
    ctx.drawImage(alexHead, -HEAD_SIZE / 2, -HEAD_SIZE / 2, HEAD_SIZE, HEAD_SIZE);
    ctx.restore();

    ctx.restore(); // end squash/stretch transform
  }
}

// Dessine un pic de glace (base large, pointe au sommet)
function drawIceSpike(baseX, baseW, height) {
  const ICE = '#7EC8E3';
  const ICE_DARK = '#4A9FC9';
  const ICE_LIGHT = '#C5E7F5';
  const ICE_SHINE = '#FFFFFF';

  const topY = GROUND_Y - height;
  const cx = baseX + baseW / 2;

  // Ombre du pic (face sombre droite)
  ctx.fillStyle = ICE_DARK;
  ctx.beginPath();
  ctx.moveTo(baseX, GROUND_Y);
  ctx.lineTo(cx, topY);
  ctx.lineTo(baseX + baseW, GROUND_Y);
  ctx.closePath();
  ctx.fill();

  // Face claire (gauche du pic)
  ctx.fillStyle = ICE;
  ctx.beginPath();
  ctx.moveTo(baseX, GROUND_Y);
  ctx.lineTo(cx, topY);
  ctx.lineTo(cx, GROUND_Y);
  ctx.closePath();
  ctx.fill();

  // Facette très claire (reflet gauche)
  ctx.fillStyle = ICE_LIGHT;
  ctx.beginPath();
  ctx.moveTo(baseX + baseW * 0.15, GROUND_Y);
  ctx.lineTo(cx, topY);
  ctx.lineTo(cx - baseW * 0.12, GROUND_Y);
  ctx.closePath();
  ctx.fill();

  // Reflet blanc fin au sommet
  ctx.strokeStyle = ICE_SHINE;
  ctx.lineWidth = 1.2;
  ctx.beginPath();
  ctx.moveTo(cx - 1, topY + 3);
  ctx.lineTo(cx - baseW * 0.2, GROUND_Y - 4);
  ctx.stroke();

  // Neige à la base
  ctx.fillStyle = '#FFFFFF';
  ctx.beginPath();
  ctx.ellipse(cx, GROUND_Y, baseW * 0.6, 3, 0, Math.PI, 0);
  ctx.fill();
}

function drawCactus(ob) {
  if (ob.type === 'small') {
    drawIceSpike(ob.x + 3, 12, 34);
  } else if (ob.type === 'large') {
    drawIceSpike(ob.x + 2, 20, 46);
    // Petit cristal brillant au sommet (accent couleur)
    const cx = ob.x + 2 + 10;
    const topY = GROUND_Y - 46;
    ctx.fillStyle = '#FF7F9E';
    ctx.beginPath();
    ctx.arc(cx, topY - 3, 2.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#FFFFFF';
    ctx.beginPath();
    ctx.arc(cx - 0.5, topY - 3.5, 1, 0, Math.PI * 2);
    ctx.fill();
  } else if (ob.type === 'double') {
    drawIceSpike(ob.x, 12, 34);
    drawIceSpike(ob.x + 16, 12, 42);
  }
}

// === DESERT THEME === //

function drawBrickStack(x, w, h) {
  const BRICK = '#B8563A';
  const BRICK_DARK = '#8A3E27';
  const MORTAR = '#E3CCA0';
  const brickH = 7;
  const brickW = w;

  // Mortar background
  ctx.fillStyle = MORTAR;
  ctx.fillRect(x, GROUND_Y - h, w, h);

  // Bricks in staggered rows
  ctx.fillStyle = BRICK;
  const rows = Math.ceil(h / brickH);
  for (let row = 0; row < rows; row++) {
    const yTop = GROUND_Y - (row + 1) * brickH + 1;
    const stagger = row % 2 === 0 ? 0 : brickW / 2;
    for (let i = -1; i <= 1; i++) {
      const bx = x + i * brickW + stagger;
      const clipX = Math.max(bx, x);
      const clipR = Math.min(bx + brickW, x + w);
      if (clipR - clipX > 0) {
        ctx.fillRect(clipX + 0.5, yTop + 0.5, clipR - clipX - 1, brickH - 1.5);
      }
    }
  }

  // Dark cap on top (shadow ridge)
  ctx.fillStyle = BRICK_DARK;
  ctx.fillRect(x, GROUND_Y - h, w, 1.5);
  // Edge highlight (left)
  ctx.fillStyle = 'rgba(255, 220, 180, 0.25)';
  ctx.fillRect(x, GROUND_Y - h + 1, 1, h - 1);
}

function drawBrickObstacle(ob) {
  if (ob.type === 'small') {
    drawBrickStack(ob.x + 2, 14, 34);
  } else if (ob.type === 'large') {
    drawBrickStack(ob.x + 2, 22, 46);
    // Petit drapeau/flag au sommet (touche deco)
    const x = ob.x + 2 + 11;
    ctx.fillStyle = '#2C3E50';
    ctx.fillRect(x, GROUND_Y - 46 - 6, 1, 6);
    ctx.fillStyle = '#F1C40F';
    ctx.fillRect(x + 1, GROUND_Y - 46 - 6, 5, 3);
  } else if (ob.type === 'double') {
    drawBrickStack(ob.x, 12, 34);
    drawBrickStack(ob.x + 16, 12, 42);
  }
}

// Mexicain volant : sombrero + poncho + moustache + ailes
function drawFlyingMariachi(ob) {
  const cx = ob.x + ob.w / 2;
  const bottomY = ob.y + ob.h;

  const bob = Math.sin(frame * 0.15) * 1.5;
  const wingFlap = Math.sin(frame * 0.45);
  const tilt = Math.sin(frame * 0.15) * 0.05;

  ctx.save();
  ctx.translate(cx, bottomY - 4 + bob);
  ctx.rotate(tilt);

  // Poncho (triangle rouge/orange)
  ctx.fillStyle = '#C0392B';
  ctx.beginPath();
  ctx.moveTo(-ob.w / 2 + 2, 0);
  ctx.lineTo(ob.w / 2 - 2, 0);
  ctx.lineTo(4, -14);
  ctx.lineTo(-4, -14);
  ctx.closePath();
  ctx.fill();

  // Rayures jaunes sur le poncho
  ctx.fillStyle = '#F1C40F';
  ctx.fillRect(-ob.w / 2 + 3, -4, ob.w - 6, 1.5);
  ctx.fillRect(-ob.w / 2 + 3, -1, ob.w - 6, 1.5);

  // Visage (brun clair)
  ctx.fillStyle = '#D9A87A';
  ctx.beginPath();
  ctx.arc(0, -18, 6, 0, Math.PI * 2);
  ctx.fill();

  // Yeux
  ctx.fillStyle = '#1A1A1A';
  ctx.beginPath();
  ctx.arc(-2, -19, 0.9, 0, Math.PI * 2);
  ctx.arc(2, -19, 0.9, 0, Math.PI * 2);
  ctx.fill();

  // Moustache noire (grosse)
  ctx.strokeStyle = '#2B1810';
  ctx.lineWidth = 1.8;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(-4, -15);
  ctx.quadraticCurveTo(-2, -13.5, 0, -15);
  ctx.quadraticCurveTo(2, -13.5, 4, -15);
  ctx.stroke();
  ctx.lineCap = 'butt';

  // Sombrero : dome central
  ctx.fillStyle = '#6B3410';
  ctx.beginPath();
  ctx.ellipse(0, -26, 5, 4, 0, 0, Math.PI * 2);
  ctx.fill();

  // Sombrero : bord large
  ctx.fillStyle = '#8B4513';
  ctx.beginPath();
  ctx.ellipse(0, -23, 13, 2.5, 0, 0, Math.PI * 2);
  ctx.fill();

  // Bande decorative doree sur le sombrero
  ctx.fillStyle = '#F1C40F';
  ctx.fillRect(-4, -24, 8, 1);

  // Pompons pendants sous le bord
  ctx.fillStyle = '#F1C40F';
  ctx.beginPath();
  ctx.arc(-12, -22, 1, 0, Math.PI * 2);
  ctx.arc(12, -22, 1, 0, Math.PI * 2);
  ctx.fill();

  // Ailes qui battent (gris clair)
  ctx.fillStyle = '#F5F5F5';
  ctx.save();
  ctx.translate(-ob.w / 2 + 2, -6);
  ctx.rotate(-wingFlap * 0.5);
  ctx.beginPath();
  ctx.ellipse(-2, 0, 5, 2.5, -0.3, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
  ctx.save();
  ctx.translate(ob.w / 2 - 2, -6);
  ctx.rotate(wingFlap * 0.5);
  ctx.beginPath();
  ctx.ellipse(2, 0, 5, 2.5, 0.3, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  ctx.restore();
}

// Portail des enfers : double battant plein-hauteur qui s'ouvre a l'approche du joueur
function drawDoor(ob) {
  const x = ob.x;
  const w = ob.w;
  const fullH = GROUND_Y;
  const centerX = x + w / 2;

  // Progression d'ouverture basee sur la proximite du joueur (smoothstep)
  const dist = Math.abs(centerX - dino.x);
  const openRange = 200;
  let raw = 1 - Math.min(dist / openRange, 1);
  if (ob.triggered) raw = 1;
  const progress = raw * raw * (3 - 2 * raw);

  // Palette du theme cible
  const nextIsDesert = currentTheme === 'ice';
  const innerCore = '#FFFFFF';
  const innerGlow = nextIsDesert ? '#FF7A2A' : '#5FC0E8';
  const frameAccent = nextIsDesert ? '#FFB347' : '#A8E4FF';
  const emberR = nextIsDesert ? 255 : 180;
  const emberG = nextIsDesert ? 130 : 220;
  const emberB = nextIsDesert ? 40 : 255;

  // === Halo interne pulsant (visible par l'ouverture) ===
  const pulse = 0.75 + Math.sin(frame * 0.18) * 0.2;
  const grad = ctx.createRadialGradient(centerX, fullH / 2, 2, centerX, fullH / 2, w + progress * 40);
  grad.addColorStop(0, innerCore);
  grad.addColorStop(0.25, innerGlow);
  grad.addColorStop(1, 'rgba(0, 0, 0, 0)');
  ctx.globalAlpha = (0.45 + progress * 0.5) * pulse;
  ctx.fillStyle = grad;
  ctx.fillRect(x - 60, 0, w + 120, fullH);
  ctx.globalAlpha = 1;

  // === Piliers de pierre sombre ===
  const pillarW = 10;
  const stoneGrad = ctx.createLinearGradient(0, 0, 0, fullH);
  stoneGrad.addColorStop(0, '#3A2520');
  stoneGrad.addColorStop(0.5, '#251612');
  stoneGrad.addColorStop(1, '#120906');
  ctx.fillStyle = stoneGrad;
  ctx.fillRect(x - pillarW, 0, pillarW, fullH);
  ctx.fillRect(x + w, 0, pillarW, fullH);

  // Lignes de pierre (blocs horizontaux)
  ctx.strokeStyle = 'rgba(0, 0, 0, 0.6)';
  ctx.lineWidth = 1;
  for (let yi = 25; yi < fullH; yi += 28) {
    ctx.beginPath();
    ctx.moveTo(x - pillarW, yi);
    ctx.lineTo(x, yi);
    ctx.moveTo(x + w, yi);
    ctx.lineTo(x + w + pillarW, yi);
    ctx.stroke();
  }

  // Chapiteaux ornemnetes (accent couleur theme cible)
  ctx.fillStyle = frameAccent;
  ctx.fillRect(x - pillarW - 2, 0, pillarW + 4, 4);
  ctx.fillRect(x + w - 2, 0, pillarW + 4, 4);
  ctx.fillStyle = '#1A0D0A';
  ctx.fillRect(x - pillarW - 2, 4, pillarW + 4, 3);
  ctx.fillRect(x + w - 2, 4, pillarW + 4, 3);

  // === Linteau/arche sombre au sommet ===
  ctx.fillStyle = stoneGrad;
  ctx.beginPath();
  ctx.moveTo(x - pillarW - 2, 0);
  ctx.lineTo(x + w + pillarW + 2, 0);
  ctx.lineTo(x + w + pillarW + 2, 8);
  ctx.quadraticCurveTo(centerX, 22, x - pillarW - 2, 8);
  ctx.closePath();
  ctx.fill();

  // Pierre de cle centrale (ornement)
  ctx.fillStyle = frameAccent;
  ctx.beginPath();
  ctx.moveTo(centerX - 5, 4);
  ctx.lineTo(centerX + 5, 4);
  ctx.lineTo(centerX + 3, 14);
  ctx.lineTo(centerX - 3, 14);
  ctx.closePath();
  ctx.fill();

  // === Double battant en bois sombre qui s'ouvre ===
  const panelW = (w - 2) / 2;
  const leftX = x + 1;
  const rightEdge = x + w - 1;
  const scaleX = 1 - progress * 0.94;

  const doorGrad = ctx.createLinearGradient(0, 0, panelW, 0);
  doorGrad.addColorStop(0, '#4A2518');
  doorGrad.addColorStop(0.5, '#2B1408');
  doorGrad.addColorStop(1, '#180905');

  const drawPanel = (isLeft) => {
    ctx.save();
    if (isLeft) {
      ctx.translate(leftX, 0);
      ctx.scale(scaleX, 1);
    } else {
      ctx.translate(rightEdge, 0);
      ctx.scale(-scaleX, 1);
    }
    // Panneau bois
    ctx.fillStyle = doorGrad;
    ctx.fillRect(0, 0, panelW, fullH);
    // Bandes metalliques (horizontales)
    ctx.fillStyle = '#6B4815';
    ctx.fillRect(0, 30, panelW, 3);
    ctx.fillRect(0, fullH - 55, panelW, 3);
    // Divisions verticales (planches)
    ctx.strokeStyle = 'rgba(0, 0, 0, 0.55)';
    ctx.lineWidth = 1;
    for (let i = 1; i < 3; i++) {
      const lx = (panelW / 3) * i;
      ctx.beginPath();
      ctx.moveTo(lx, 6);
      ctx.lineTo(lx, fullH - 4);
      ctx.stroke();
    }
    // Clous decoratifs
    ctx.fillStyle = '#8B6914';
    [25, 90, 150, 190].forEach(cy => {
      ctx.beginPath();
      ctx.arc(4, cy, 1.2, 0, Math.PI * 2);
      ctx.arc(panelW - 10, cy, 1.2, 0, Math.PI * 2);
      ctx.fill();
    });
    // Anneau de poignee (cote central)
    ctx.fillStyle = '#1A0D08';
    ctx.beginPath();
    ctx.arc(panelW - 5, fullH / 2, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#C9A35C';
    ctx.lineWidth = 1.8;
    ctx.beginPath();
    ctx.arc(panelW - 5, fullH / 2, 3.5, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  };

  drawPanel(true);
  drawPanel(false);

  // === Braises/etincelles qui s'echappent quand la porte s'ouvre ===
  if (progress > 0.08) {
    const count = 10;
    for (let i = 0; i < count; i++) {
      const seed = i * 13.7;
      const cycle = 70;
      const t = ((frame + seed) % cycle) / cycle;
      const horizOffset = Math.sin(seed + t * 3) * w * 0.3;
      const sx = centerX + horizOffset;
      const sy = fullH - 10 - t * (fullH - 30);
      const size = Math.max(0, (1 - t) * 2.6 * progress);
      const alpha = (1 - t) * progress * 0.95;
      if (size > 0.3) {
        ctx.fillStyle = `rgba(${emberR}, ${Math.floor(emberG + t * 40)}, ${emberB}, ${alpha.toFixed(2)})`;
        ctx.beginPath();
        ctx.arc(sx, sy, size, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }
}

// Pingu le pingouin (remplace les oiseaux)
function drawBird(ob) {
  const BLACK = '#1C1C1C';
  const WHITE = '#FFFFFF';
  const ORANGE = '#FF8C00';
  const ORANGE_D = '#D46E00';

  const cx = ob.x + ob.w / 2;
  const topY = ob.y;
  const bottomY = ob.y + ob.h;

  // Petit bobbing vertical + mini waddle
  const bob = Math.sin(frame * 0.15) * 1.5;
  const tilt = Math.sin(frame * 0.15) * 0.08;
  const flipperFlap = Math.sin(frame * 0.3) * 0.6;

  ctx.save();
  ctx.translate(cx, bottomY - 4 + bob);
  ctx.rotate(tilt);

  // === PIEDS (orange) ===
  ctx.fillStyle = ORANGE;
  // Pied gauche
  ctx.beginPath();
  ctx.ellipse(-4, 3, 5, 2.5, 0, 0, Math.PI * 2);
  ctx.fill();
  // Pied droit
  ctx.beginPath();
  ctx.ellipse(5, 3, 5, 2.5, 0, 0, Math.PI * 2);
  ctx.fill();

  // === CORPS (ovale noir) ===
  const bodyH = ob.h - 6;
  ctx.fillStyle = BLACK;
  ctx.beginPath();
  ctx.ellipse(0, -bodyH / 2 + 2, ob.w / 2 - 2, bodyH / 2, 0, 0, Math.PI * 2);
  ctx.fill();

  // === VENTRE BLANC ===
  ctx.fillStyle = WHITE;
  ctx.beginPath();
  ctx.ellipse(0, -bodyH / 2 + 3, ob.w / 2 - 5, bodyH / 2 - 3, 0, 0, Math.PI * 2);
  ctx.fill();

  // === TETE (bien distincte, plus grande) ===
  const headY = -bodyH + 1;
  const headR = ob.w / 2 - 1;
  ctx.fillStyle = BLACK;
  ctx.beginPath();
  ctx.arc(0, headY, headR, 0, Math.PI * 2);
  ctx.fill();

  // === BEC ORANGE (pointant vers la gauche - direction de deplacement) ===
  ctx.fillStyle = ORANGE;
  ctx.beginPath();
  ctx.moveTo(-headR + 2, headY);
  ctx.lineTo(-headR - 4, headY - 1);
  ctx.lineTo(-headR - 4, headY + 2);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = ORANGE_D;
  ctx.beginPath();
  ctx.moveTo(-headR + 2, headY + 1);
  ctx.lineTo(-headR - 4, headY + 2);
  ctx.lineTo(-headR - 2, headY + 2);
  ctx.closePath();
  ctx.fill();

  // === YEUX (deux gros yeux blancs avec pupilles) ===
  ctx.fillStyle = WHITE;
  ctx.beginPath();
  ctx.arc(-3, headY - 1, 2.8, 0, Math.PI * 2);
  ctx.arc(3, headY - 1, 2.8, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = BLACK;
  ctx.beginPath();
  ctx.arc(-3, headY - 1, 1.5, 0, Math.PI * 2);
  ctx.arc(3, headY - 1, 1.5, 0, Math.PI * 2);
  ctx.fill();
  // Reflet blanc dans les yeux
  ctx.fillStyle = WHITE;
  ctx.beginPath();
  ctx.arc(-2.5, headY - 1.5, 0.6, 0, Math.PI * 2);
  ctx.arc(3.5, headY - 1.5, 0.6, 0, Math.PI * 2);
  ctx.fill();

  // === NAGEOIRES (flippers) ===
  ctx.fillStyle = BLACK;
  // Nageoire gauche (devant)
  ctx.save();
  ctx.translate(-ob.w / 2 + 3, -bodyH / 2);
  ctx.rotate(flipperFlap);
  ctx.beginPath();
  ctx.ellipse(0, 2, 2.5, 7, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
  // Nageoire droite
  ctx.save();
  ctx.translate(ob.w / 2 - 3, -bodyH / 2);
  ctx.rotate(-flipperFlap);
  ctx.beginPath();
  ctx.ellipse(0, 2, 2.5, 7, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  ctx.restore();
}

function drawGround() {
  if (currentTheme === 'ice') {
    // Icy ground gradient (white snow → cool blue shadow)
    const grd = ctx.createLinearGradient(0, GROUND_Y, 0, H);
    grd.addColorStop(0, '#F5FBFF');
    grd.addColorStop(1, '#B8D4E8');
    ctx.fillStyle = grd;
    ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);

    ctx.strokeStyle = '#7FB0D4';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(0, GROUND_Y);
    ctx.lineTo(W, GROUND_Y);
    ctx.stroke();

    for (let i = 0; i < W + 20; i += 3) {
      const xp = (i - groundOffset % 20);
      if (Math.sin(xp * 0.5) > 0.7) {
        ctx.fillStyle = '#A8C8DE';
        ctx.fillRect(xp, GROUND_Y + 4 + (xp % 5), 2, 1);
      }
    }

    ctx.strokeStyle = 'rgba(120, 160, 195, 0.35)';
    ctx.lineWidth = 1;
    for (let i = 0; i < W + 60; i += 60) {
      const xp = ((i - groundOffset * 0.8) % (W + 60));
      if (xp < 0) continue;
      ctx.beginPath();
      ctx.moveTo(xp, GROUND_Y + 6);
      ctx.lineTo(xp + 8, GROUND_Y + 10);
      ctx.lineTo(xp + 4, GROUND_Y + 18);
      ctx.lineTo(xp + 14, GROUND_Y + 24);
      ctx.stroke();
    }

    ctx.fillStyle = '#FFFFFF';
    for (let i = 0; i < W + 40; i += 40) {
      const xp = ((i - groundOffset * 0.8) % (W + 40));
      if (xp < 0) continue;
      ctx.beginPath();
      ctx.arc(xp, GROUND_Y, 3, Math.PI, 0);
      ctx.fill();
    }
  } else {
    // Desert ground gradient (sand → deeper warm shadow)
    const grd = ctx.createLinearGradient(0, GROUND_Y, 0, H);
    grd.addColorStop(0, '#F5D4A3');
    grd.addColorStop(1, '#C08548');
    ctx.fillStyle = grd;
    ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);

    ctx.strokeStyle = '#A6723E';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(0, GROUND_Y);
    ctx.lineTo(W, GROUND_Y);
    ctx.stroke();

    // Sand grains / pebbles
    for (let i = 0; i < W + 20; i += 3) {
      const xp = (i - groundOffset % 20);
      if (Math.sin(xp * 0.5) > 0.7) {
        ctx.fillStyle = '#8C5A2E';
        ctx.fillRect(xp, GROUND_Y + 4 + (xp % 5), 2, 1);
      }
    }

    // Sand ripples (waves of dunes)
    ctx.strokeStyle = 'rgba(140, 90, 46, 0.35)';
    ctx.lineWidth = 1;
    for (let i = 0; i < W + 60; i += 60) {
      const xp = ((i - groundOffset * 0.8) % (W + 60));
      if (xp < 0) continue;
      ctx.beginPath();
      ctx.moveTo(xp, GROUND_Y + 8);
      ctx.quadraticCurveTo(xp + 15, GROUND_Y + 5, xp + 30, GROUND_Y + 8);
      ctx.stroke();
    }

    // Small dune bumps along ground line
    ctx.fillStyle = '#E8BC7E';
    for (let i = 0; i < W + 50; i += 50) {
      const xp = ((i - groundOffset * 0.8) % (W + 50));
      if (xp < 0) continue;
      ctx.beginPath();
      ctx.arc(xp, GROUND_Y, 4, Math.PI, 0);
      ctx.fill();
    }
  }
}

function drawSnow() {
  ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
  snowflakes.forEach(f => {
    ctx.beginPath();
    ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
    ctx.fill();
  });
}

function drawClouds() {
  clouds.forEach(c => {
    const s = c.scale || 1;
    ctx.save();
    ctx.translate(c.x, c.y);
    ctx.scale(s, s);

    // Soft shadow underneath (cool blue)
    ctx.fillStyle = 'rgba(90, 140, 190, 0.12)';
    ctx.beginPath();
    ctx.ellipse(22, 14, 28, 5, 0, 0, Math.PI * 2);
    ctx.fill();

    // Main cloud body (stacked circles for puffy shape)
    ctx.fillStyle = '#FFFFFF';
    ctx.beginPath();
    ctx.arc(10, 10, 10, 0, Math.PI * 2);
    ctx.arc(22, 6, 13, 0, Math.PI * 2);
    ctx.arc(36, 9, 10, 0, Math.PI * 2);
    ctx.arc(28, 13, 11, 0, Math.PI * 2);
    ctx.arc(16, 13, 9, 0, Math.PI * 2);
    ctx.fill();

    // Subtle icy highlight (top-left)
    ctx.fillStyle = 'rgba(225, 240, 255, 0.7)';
    ctx.beginPath();
    ctx.arc(20, 3, 7, 0, Math.PI * 2);
    ctx.arc(12, 7, 5, 0, Math.PI * 2);
    ctx.fill();

    // Cool blue underside (depth)
    ctx.fillStyle = 'rgba(150, 185, 215, 0.3)';
    ctx.beginPath();
    ctx.arc(28, 16, 9, 0, Math.PI);
    ctx.arc(16, 16, 7, 0, Math.PI);
    ctx.fill();

    ctx.restore();
  });
}

// Swiss flag planted on a peak (peakX, peakY = tip of the mountain)
function drawSwissFlag(peakX, peakY) {
  // Pole
  const poleTop = peakY - 18;
  ctx.strokeStyle = '#4A4A4A';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(peakX, peakY);
  ctx.lineTo(peakX, poleTop);
  ctx.stroke();

  // Flag waving slightly (sine-based on frame)
  const wave = Math.sin(frame * 0.08 + peakX * 0.1) * 0.5;
  const fw = 10, fh = 8;
  const flagX = peakX + 1;
  const flagY = poleTop;

  // Red background
  ctx.fillStyle = '#DA291C';
  ctx.beginPath();
  ctx.moveTo(flagX, flagY);
  ctx.lineTo(flagX + fw, flagY + wave);
  ctx.lineTo(flagX + fw, flagY + fh + wave);
  ctx.lineTo(flagX, flagY + fh);
  ctx.closePath();
  ctx.fill();

  // White cross
  ctx.fillStyle = '#FFFFFF';
  ctx.fillRect(flagX + 1, flagY + fh / 2 - 1, fw - 3, 1.5);
  ctx.fillRect(flagX + fw / 2 - 1, flagY + 1.5, 1.5, fh - 3);
}

function spawnObstacle() {
  // Avoid unplayable overlaps: skip spawn if last obstacle is still too close
  if (obstacles.length > 0) {
    const last = obstacles[obstacles.length - 1];
    if (W - last.x < 120) { nextObstacleIn = 20; return; }
  }

  const r = Math.random();
  let ob;
  if (r < 0.3) {
    ob = { x: W, type: 'small', w: 18, h: 34, bird: false };
  } else if (r < 0.55) {
    ob = { x: W, type: 'large', w: 28, h: 46, bird: false };
  } else if (r < 0.8) {
    ob = { x: W, type: 'double', w: 28, h: 42, bird: false };
  } else {
    // Pingu le pingouin a hauteur variable : force sauter OU glisser selon le cas
    const heights = [50, 70, 90];
    const h = heights[Math.floor(Math.random() * heights.length)];
    ob = { x: W, y: GROUND_Y - h, type: 'bird', w: 26, h: 36, bird: true };
    // Son "nut nut" a l'apparition
    const pinguSound = document.getElementById('jump-sound');
    if (pinguSound) {
      pinguSound.currentTime = 0;
      pinguSound.play().catch(() => {});
    }
  }
  obstacles.push(ob);
  nextObstacleIn = 40 + Math.random() * 60;
}

function checkCollision(ob) {
  // Doors never collide - they are passable portals
  if (ob.isDoor) return false;
  // Dino hitbox
  let dx, dy, dw, dh;
  if (dino.ducking && !dino.jumping) {
    dw = 40; dh = 20;
    dx = dino.x + 2;
    dy = GROUND_Y - dh + 2;
    dw -= 4; dh -= 4;
  } else {
    dx = dino.x + 6;
    dy = dino.y - dino.h + 6;
    dw = dino.w - 12;
    dh = dino.h - 6;
  }

  // Obstacle hitbox
  let ox, oy, ow, oh;
  if (ob.bird) {
    ox = ob.x + 2; oy = ob.y + 2; ow = ob.w - 4; oh = ob.h - 4;
  } else {
    ox = ob.x + 2;
    oy = GROUND_Y - ob.h + 2;
    ow = ob.w - 4;
    oh = ob.h - 4;
  }

  return dx < ox + ow && dx + dw > ox && dy < oy + oh && dy + dh > oy;
}

function update() {
  if (gameState !== 'running') return;

  frame++;
  groundOffset += speed;

  // Speed up over time (smooth curve: slow → rapid → intense)
  speed = 6 + Math.pow(score * 0.01, 1.2);
  if (speed > 14) speed = 14;

  // Dino physics
  if (dino.jumping) {
    dino.vy += GRAVITY;
    dino.y += dino.vy;
    dino.wasJumping = true;
    if (dino.y >= GROUND_Y) {
      dino.y = GROUND_Y;
      // Landing impact: squash proportional to fall speed
      const impactForce = Math.min(dino.vy * 0.04, 0.25);
      dino.squash = 1 - impactForce;
      dino.squashVel = -impactForce * 0.5;
      dino.vy = 0;
      dino.jumping = false;
      dino.landTimer = 0;
    }
  }

  // Clouds
  clouds.forEach(c => {
    c.x -= speed * 0.2;
    if (c.x < -50) { c.x = W + Math.random() * 100; c.y = 20 + Math.random() * 50; }
  });

  // Obstacles
  nextObstacleIn -= 1;
  if (nextObstacleIn <= 0) spawnObstacle();

  // Spawn a theme-transition door when threshold is reached (and no door already queued)
  if (!doorSpawned && Math.floor(score) >= nextThemeChange) {
    // Ensure enough gap from last obstacle before spawning the door
    const last = obstacles[obstacles.length - 1];
    const gapOK = !last || (W - last.x >= 180);
    if (gapOK) {
      obstacles.push({ x: W + 40, type: 'door', w: 70, h: GROUND_Y, bird: false, isDoor: true });
      doorSpawned = true;
      nextObstacleIn = Math.max(nextObstacleIn, 90); // leave room after the door
    }
  }

  obstacles.forEach(ob => { ob.x -= speed; });
  obstacles = obstacles.filter(ob => ob.x > -80);

  // Trigger theme swap when dino passes through the door center
  for (const ob of obstacles) {
    if (ob.isDoor && !ob.triggered && ob.x + ob.w / 2 < dino.x) {
      ob.triggered = true;
      currentTheme = currentTheme === 'ice' ? 'desert' : 'ice';
      nextThemeChange += 150;
      doorSpawned = false;
      themeFlash = 0.7;
    }
  }

  // Collision
  for (const ob of obstacles) {
    if (checkCollision(ob)) {
      // Screen shake on impact (once per obstacle)
      if (!ob.hit) {
        ob.hit = true;
        const shake = 5;
        canvas.style.transform = `translate(${(Math.random() - 0.5) * shake * 2}px, ${(Math.random() - 0.5) * shake * 2}px)`;
        setTimeout(() => { canvas.style.transform = 'translate(0, 0)'; }, 80);
      }
      if (COLLISION_ENABLED) {
        gameState = 'over';
        if (score > highScore) highScore = score;
        messageEl.innerHTML = '<h2>GAME OVER</h2><p>Score: ' + String(Math.floor(score)).padStart(5, '0') +
          (highScore > 0 ? ' | Record: ' + String(Math.floor(highScore)).padStart(5, '0') : '') +
          '</p><p style="margin-top:8px">Appuie sur Espace pour rejouer</p>';
        messageEl.style.display = 'block';
        return;
      }
    }
  }

  // Score
  score += 0.1;
  scoreEl.textContent = String(Math.floor(score)).padStart(5, '0');
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  if (currentTheme === 'ice') {
    // Soft icy sky gradient
    const sky = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
    sky.addColorStop(0, '#BCDCF5');
    sky.addColorStop(0.5, '#DEEFFB');
    sky.addColorStop(1, '#F4FAFF');
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, W, GROUND_Y);

    ctx.fillStyle = 'rgba(220, 240, 255, 0.55)';
    ctx.beginPath();
    ctx.arc(W - 110, 55, 40, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(235, 248, 255, 0.85)';
    ctx.beginPath();
    ctx.arc(W - 110, 55, 24, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = 'rgba(170, 200, 225, 0.55)';
    ctx.beginPath();
    ctx.moveTo(0, GROUND_Y);
    ctx.lineTo(60, 150); ctx.lineTo(130, 180); ctx.lineTo(210, 130);
    ctx.lineTo(290, 170); ctx.lineTo(360, 150); ctx.lineTo(440, 185);
    ctx.lineTo(520, 140); ctx.lineTo(610, 175); ctx.lineTo(690, 145);
    ctx.lineTo(770, 180); ctx.lineTo(W, 160); ctx.lineTo(W, GROUND_Y);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = 'rgba(255, 255, 255, 0.85)';
    ctx.beginPath();
    ctx.moveTo(210, 130); ctx.lineTo(225, 145); ctx.lineTo(195, 145); ctx.closePath();
    ctx.moveTo(520, 140); ctx.lineTo(538, 158); ctx.lineTo(505, 158); ctx.closePath();
    ctx.moveTo(690, 145); ctx.lineTo(705, 160); ctx.lineTo(677, 160); ctx.closePath();
    ctx.fill();

    drawSwissFlag(210, 130);
    drawSwissFlag(520, 140);
    drawSwissFlag(690, 145);
  } else {
    // Desert sky gradient (warm sunset tones)
    const sky = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
    sky.addColorStop(0, '#FFC88A');
    sky.addColorStop(0.5, '#FFE0B5');
    sky.addColorStop(1, '#FFF2DA');
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, W, GROUND_Y);

    // Hot sun (saturated orange)
    ctx.fillStyle = 'rgba(255, 180, 100, 0.55)';
    ctx.beginPath();
    ctx.arc(W - 110, 55, 45, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(255, 200, 120, 0.85)';
    ctx.beginPath();
    ctx.arc(W - 110, 55, 28, 0, Math.PI * 2);
    ctx.fill();

    // Distant mesas / desert mountains (warm brown silhouette)
    ctx.fillStyle = 'rgba(180, 120, 80, 0.5)';
    ctx.beginPath();
    ctx.moveTo(0, GROUND_Y);
    ctx.lineTo(50, 170); ctx.lineTo(110, 175); ctx.lineTo(140, 155);
    ctx.lineTo(200, 155); ctx.lineTo(230, 180); ctx.lineTo(310, 170);
    ctx.lineTo(360, 150); ctx.lineTo(420, 150); ctx.lineTo(460, 185);
    ctx.lineTo(540, 160); ctx.lineTo(590, 160); ctx.lineTo(630, 180);
    ctx.lineTo(710, 165); ctx.lineTo(760, 165); ctx.lineTo(W, 180);
    ctx.lineTo(W, GROUND_Y);
    ctx.closePath();
    ctx.fill();

    // Silhouette de cactus au loin
    ctx.fillStyle = 'rgba(120, 90, 60, 0.45)';
    [100, 270, 480, 680].forEach(cx => {
      ctx.fillRect(cx - 2, GROUND_Y - 22, 4, 22);
      ctx.fillRect(cx - 6, GROUND_Y - 15, 4, 8);
      ctx.fillRect(cx + 2, GROUND_Y - 18, 4, 8);
    });
  }

  drawClouds();
  drawGround();
  if (currentTheme === 'ice') drawSnow();

  obstacles.forEach(ob => {
    if (ob.isDoor) drawDoor(ob);
    else if (ob.bird) {
      if (currentTheme === 'ice') drawBird(ob);
      else drawFlyingMariachi(ob);
    } else {
      if (currentTheme === 'ice') drawCactus(ob);
      else drawBrickObstacle(ob);
    }
  });

  drawDino();

  // Theme transition flash
  if (themeFlash > 0) {
    ctx.fillStyle = `rgba(255, 255, 255, ${themeFlash})`;
    ctx.fillRect(0, 0, W, H);
    themeFlash -= 0.04;
  }
}

function animateSnow() {
  // Snowflakes always drift, even when game is idle
  snowflakes.forEach(f => {
    f.drift += 0.02;
    const scroll = gameState === 'running' ? speed * 0.15 : 0.3;
    f.x -= scroll + Math.sin(f.drift) * 0.3;
    f.y += f.vy;
    if (f.y > GROUND_Y) { f.y = -2; f.x = Math.random() * W; }
    if (f.x < -5) f.x = W + 5;
  });
}

function loop() {
  update();
  animateSnow();
  draw();
  requestAnimationFrame(loop);
}

function jump() {
  if (!dino.jumping) {
    dino.jumping = true;
    dino.vy = dino.ducking ? DUCK_JUMP_FORCE : JUMP_FORCE;
    // Stretch on takeoff
    dino.squash = 1.2;
    dino.squashVel = 0.1;
  }
}

function startGame() {
  reset();
  gameState = 'running';
  messageEl.style.display = 'none';
}

// Input
document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp') {
    e.preventDefault();
    if (gameState === 'idle' || gameState === 'over') startGame();
    else if (gameState === 'running') jump();
  }
  if (e.code === 'ArrowDown') {
    e.preventDefault();
    if (gameState === 'running') dino.ducking = true;
  }
});

document.addEventListener('keyup', e => {
  if (e.code === 'ArrowDown') dino.ducking = false;
});

// Touch support (tap = jump, swipe down = slide)
let touchStartY = 0;
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  touchStartY = e.touches[0].clientY;
  if (gameState === 'idle' || gameState === 'over') startGame();
});

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (gameState === 'running') {
    const dy = e.touches[0].clientY - touchStartY;
    if (dy > 30) dino.ducking = true;
  }
});

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (gameState === 'running') {
    dino.ducking = false;
    if (dy <= 30) jump();
  }
});

// Mobile buttons
const jumpBtn = document.getElementById('jump-btn');
const duckBtn = document.getElementById('duck-btn');

jumpBtn.addEventListener('click', () => {
  if (gameState === 'idle' || gameState === 'over') startGame();
  else if (gameState === 'running') jump();
});

jumpBtn.addEventListener('touchstart', (e) => {
  e.preventDefault();
  if (gameState === 'idle' || gameState === 'over') startGame();
  else if (gameState === 'running') jump();
});

duckBtn.addEventListener('touchstart', (e) => {
  e.preventDefault();
  if (gameState === 'running') dino.ducking = true;
});

duckBtn.addEventListener('touchend', (e) => {
  e.preventDefault();
  dino.ducking = false;
});

duckBtn.addEventListener('mousedown', () => {
  if (gameState === 'running') dino.ducking = true;
});

duckBtn.addEventListener('mouseup', () => {
  dino.ducking = false;
});

loop();
</script>
